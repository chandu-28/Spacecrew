<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#06060f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Blast Shield">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>Blast Shield — Space Crew</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-deep:#06060f; --bg-panel:#0d0d1e; --bg-inset:#111122; --bg-raised:#161630;
      --border-dim:rgba(80,80,160,0.18); --border-glow:rgba(100,100,220,0.4);
      --text-bright:#eeeef8; --text-mid:#8888aa; --text-dim:#44445a;
      --cyan:#00d4d4; --blue:#4488ff; --purple:#9f60ff; --magenta:#cc44ff;
      --amber:#f0b040; --green:#44dd88; --red:#ff4455; --orange:#ff7040;
      --r8:8px; --r10:10px; --r12:12px;
    }
    html { min-height:100%; width:100%; overflow-y:scroll; }
    body {
      min-height:100%; width:100%; overflow-x:hidden; overflow-y:auto;
      background:var(--bg-deep); color:var(--text-bright);
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color:transparent; overscroll-behavior-x:none;
    }
    #app { padding:10px; width:100%; max-width:600px; margin:0 auto; padding-bottom:env(safe-area-inset-bottom,24px); }
    .nav-back { font-size:11px; color:var(--text-dim); text-decoration:none; display:inline-flex; align-items:center; gap:4px; margin-bottom:8px; }
    .hud { background:var(--bg-panel); border:0.5px solid var(--border-dim); border-radius:var(--r12); padding:10px 12px; margin-bottom:8px; display:flex; gap:10px; align-items:flex-start; }
    .hud-main { flex:1; min-width:0; }
    .hud-lbl  { font-size:9px; color:var(--text-dim); letter-spacing:.08em; text-transform:uppercase; margin-bottom:2px; }
    .hud-text { font-size:12px; color:var(--text-bright); font-weight:500; line-height:1.3; }
    .hud-flavor { font-size:11px; color:var(--text-mid); font-style:italic; margin-top:2px; line-height:1.3; }
    .hud-num  { font-size:22px; font-weight:500; color:var(--orange); line-height:1; }
    .power-wrap { margin-bottom:10px; }
    .power-meta { display:flex; justify-content:space-between; font-size:9px; color:var(--text-dim); letter-spacing:.07em; text-transform:uppercase; margin-bottom:3px; }
    .power-track { height:8px; background:var(--bg-inset); border:0.5px solid var(--border-dim); border-radius:4px; overflow:hidden; }
    .power-fill { height:100%; width:0%; border-radius:4px; background:var(--orange); transition:width .6s ease; }
    .power-fill.maxed { background:linear-gradient(90deg,#cc4020,var(--orange),#ffa080,var(--orange),#cc4020); background-size:300%; animation:shimmer 1.2s linear infinite; }
    @keyframes shimmer { 0%{background-position:300%} 100%{background-position:0%} }

    /* ══ ARIA companion ══════════════════════════════════════════ */
    :root{--aria-color:#ff7040;--aria-chest:rgba(255,112,64,.2);}
    .aria-bar{display:flex;align-items:center;gap:10px;background:var(--bg-panel);border:0.5px solid var(--border-dim);border-radius:var(--r12);padding:8px 10px;margin-bottom:8px;}
    .aria-wrap{width:52px;height:52px;flex-shrink:0;cursor:pointer;animation:aria-bob 2.2s ease-in-out infinite;}
    @keyframes aria-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    .aria-wrap.aria-happy{animation:aria-bounce .55s ease;}
    @keyframes aria-bounce{0%,100%{transform:scale(1) translateY(0)}35%{transform:scale(1.2) translateY(-7px)}65%{transform:scale(.95) translateY(1px)}}
    .aria-wrap.aria-sad{animation:aria-wag .4s ease;}
    @keyframes aria-wag{0%,100%{transform:rotate(0)}30%{transform:rotate(-9deg)}70%{transform:rotate(9deg)}}
    .aria-bubble{flex:1;position:relative;background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.1);border-radius:var(--r10);padding:7px 10px;min-height:38px;}
    .aria-bubble::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);border:5px solid transparent;border-right-color:rgba(255,255,255,.1);}
    .aria-name{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--aria-color);display:block;margin-bottom:2px;}
    .aria-msg{font-size:11.5px;color:var(--text-bright);line-height:1.4;}
    #cel-canvas{position:fixed;inset:0;pointer-events:none;z-index:99;display:none;}
    #cel-canvas.active{display:block;}
    .ov-voss{display:flex;align-items:center;gap:10px;background:var(--bg-panel);border:1px solid rgba(255,112,64,.35);border-radius:var(--r12);padding:10px 13px;max-width:320px;width:90%;animation:ov-voss-in .45s ease;}
    @keyframes ov-voss-in{from{transform:translateY(18px);opacity:0}to{transform:none;opacity:1}}
    .ov-voss-face{width:44px;height:44px;flex-shrink:0;border-radius:50%;overflow:hidden;border:1.5px solid rgba(255,112,64,.4);}
    .ov-voss-txt{font-size:11px;color:var(--text-mid);line-height:1.5;font-style:italic;}
    .ov-voss-txt strong{color:var(--text-bright);font-style:normal;}

    /* ── Panel preview ── */
    .preview-wrap {
      background:var(--bg-panel); border:0.5px solid var(--border-dim);
      border-radius:var(--r12); padding:14px; margin-bottom:10px;
      display:flex; align-items:center; justify-content:center;
      min-height:160px; position:relative;
    }
    .panel-rect {
      background:rgba(255,112,64,0.12); border:2px solid var(--orange);
      position:relative; transition:width .12s, height .12s;
      display:flex; align-items:center; justify-content:center;
    }
    .panel-rect.match { border-color:var(--green); background:rgba(68,221,136,0.1); }
    /* dimension labels */
    .dim-w, .dim-h {
      position:absolute; font-size:11px; font-weight:600; color:var(--orange);
      background:var(--bg-deep); padding:0 4px; border-radius:3px;
    }
    .dim-w { bottom:-18px; left:50%; transform:translateX(-50%); }
    .dim-h { right:-24px; top:50%; transform:translateY(-50%); }
    .panel-rect.match .dim-w,
    .panel-rect.match .dim-h { color:var(--green); }

    /* ── Metrics row ── */
    .metrics-row { display:flex; gap:8px; margin-bottom:10px; }
    .metric-card {
      flex:1; background:var(--bg-panel); border:0.5px solid var(--border-dim);
      border-radius:var(--r10); padding:10px 12px;
    }
    .mc-lbl   { font-size:9px; color:var(--text-dim); letter-spacing:.08em; text-transform:uppercase; margin-bottom:3px; }
    .mc-formula { font-size:10px; color:var(--text-dim); margin-bottom:5px; }
    .mc-val   { font-size:20px; font-weight:600; font-variant-numeric:tabular-nums; color:var(--orange); }
    .mc-val.match { color:var(--green); }
    .mc-target { font-size:11px; color:var(--text-mid); margin-top:2px; }
    .mc-target.hit { color:var(--green); }

    /* ── Hint ── */
    .hint-panel { background:var(--bg-panel); border:0.5px solid var(--border-dim); border-radius:var(--r10); padding:10px 12px; margin-bottom:10px; font-size:11px; color:var(--text-mid); line-height:1.5; }
    .hint-panel strong { color:var(--orange); }

    /* ── Sliders ── */
    .sliders-wrap { display:flex; flex-direction:column; gap:10px; }
    .slider-row  { display:flex; flex-direction:column; gap:4px; }
    .slider-meta { display:flex; justify-content:space-between; font-size:10px; color:var(--text-dim); }
    .slider-label { font-size:10px; color:var(--text-mid); }
    input[type=range] { -webkit-appearance:none; appearance:none; width:100%; height:36px; background:transparent; outline:none; touch-action:manipulation; cursor:pointer; }
    input[type=range]::-webkit-slider-runnable-track { height:4px; border-radius:2px; background:var(--bg-inset); border:0.5px solid var(--border-dim); }
    input[type=range].orange::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--orange); box-shadow:0 0 6px rgba(255,112,64,0.5); cursor:pointer; margin-top:-8px; }
    input[type=range].amber::-webkit-slider-thumb  { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--amber);  box-shadow:0 0 6px rgba(240,176,64,0.5);  cursor:pointer; margin-top:-8px; }
    input[type=range].match::-webkit-slider-thumb  { background:var(--green); box-shadow:0 0 8px rgba(68,221,136,0.6); }

    .overlay { display:none; position:fixed; inset:0; background:rgba(6,6,15,0.88); z-index:100; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
    .overlay.show { display:flex; }
    .ov-icon  { font-size:44px; }
    .ov-title { font-size:20px; font-weight:500; color:var(--text-bright); text-align:center; padding:0 20px; }
    .ov-sub   { font-size:13px; color:var(--text-mid); text-align:center; padding:0 24px; line-height:1.5; }
    .ov-btn   { padding:12px 32px; background:var(--orange); color:#fff; border:none; border-radius:var(--r10); font-size:14px; font-weight:600; cursor:pointer; margin-top:4px; }
    .ov-btn:active { background:#cc5030; }
    .ov-btn.sec { background:transparent; border:0.5px solid var(--border-glow); color:var(--text-mid); margin-top:0; }
  </style>
</head>
<body>
<div id="app">
  <a class="nav-back" href="mission_select.html">← Fleet Commander</a>

  <!-- ARIA companion -->
  <div class="aria-bar">
    <div class="aria-wrap" id="aria-wrap" onclick="ariaTap()">
      <svg viewBox="-2 0 60 70" xmlns="http://www.w3.org/2000/svg">
        <rect x="-2" y="32" width="12" height="8" rx="4" fill="#1e1e42"/>
        <rect x="46" y="32" width="12" height="8" rx="4" fill="#1e1e42"/>
        <rect x="8" y="28" width="40" height="30" rx="10" fill="#1e1e42"/>
        <ellipse cx="28" cy="18" rx="16" ry="15" fill="#242454"/>
        <rect x="12" y="10" width="32" height="14" rx="6" fill="rgba(0,8,28,.5)"/>
        <circle cx="20" cy="17" r="4.5" fill="white"/><circle id="aria-el" cx="21" cy="18" r="2.8" fill="#111"/><circle cx="20.3" cy="15.8" r=".9" fill="white"/>
        <circle cx="36" cy="17" r="4.5" fill="white"/><circle id="aria-er" cx="37" cy="18" r="2.8" fill="#111"/><circle cx="36.3" cy="15.8" r=".9" fill="white"/>
        <path d="M22,25 Q28,29 34,25" stroke="var(--aria-color)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <rect x="26" y="2" width="4" height="8" rx="2" fill="#242454"/>
        <circle cx="28" cy="2" r="3.2" fill="var(--aria-color)"/>
        <rect x="13" y="35" width="30" height="17" rx="5" fill="var(--aria-chest)"/>
        <circle cx="21" cy="42" r="2.3" fill="var(--aria-color)" opacity=".9"/>
        <circle cx="28" cy="42" r="2.3" fill="rgba(255,255,255,.35)"/>
        <circle cx="35" cy="42" r="2.3" fill="var(--aria-color)" opacity=".9"/>
        <rect x="16" y="48" width="24" height="2.5" rx="1.25" fill="var(--aria-color)" opacity=".4"/>
        <rect x="13" y="56" width="12" height="12" rx="5" fill="#1e1e42"/>
        <rect x="31" y="56" width="12" height="12" rx="5" fill="#1e1e42"/>
      </svg>
    </div>
    <div class="aria-bubble">
      <span class="aria-name">ARIA</span>
      <span class="aria-msg" id="aria-msg">Cut the shield to exact specs!</span>
    </div>
  </div>

  <div class="hud">
    <div class="hud-main">
      <div class="hud-lbl">Mission 07 · Blast Shield</div>
      <div class="hud-text" id="hud-title">Panel Fabrication</div>
      <div class="hud-flavor" id="hud-flavor">Loading…</div>
    </div>
    <div style="text-align:right;flex-shrink:0;">
      <div class="hud-lbl">Level</div>
      <div class="hud-num" id="hud-level">36</div>
    </div>
  </div>

  <div class="power-wrap">
    <div class="power-meta"><span>Panels fabricated</span><span id="power-pct">0%</span></div>
    <div class="power-track"><div class="power-fill" id="power-fill"></div></div>
  </div>

  <!-- Panel preview -->
  <div class="preview-wrap" id="preview-wrap">
    <div class="panel-rect" id="panel-rect">
      <span class="dim-w" id="dim-w">0</span>
      <span class="dim-h" id="dim-h">0</span>
    </div>
  </div>

  <!-- Metrics -->
  <div class="metrics-row">
    <div class="metric-card" id="mc-area">
      <div class="mc-lbl">Area</div>
      <div class="mc-formula">W × H</div>
      <div class="mc-val" id="cur-area">0</div>
      <div class="mc-target" id="tgt-area">target: —</div>
    </div>
    <div class="metric-card" id="mc-perim">
      <div class="mc-lbl">Perimeter</div>
      <div class="mc-formula">2×W + 2×H</div>
      <div class="mc-val" id="cur-perim">0</div>
      <div class="mc-target" id="tgt-perim">target: —</div>
    </div>
  </div>

  <div class="hint-panel" id="hint-panel"></div>

  <!-- Sliders -->
  <div class="sliders-wrap">
    <div class="slider-row">
      <div class="slider-meta">
        <span class="slider-label" style="color:var(--orange);">Width (W)</span>
        <span id="w-val" style="color:var(--orange);font-weight:600;">1</span>
      </div>
      <input type="range" id="w-slider" class="orange" min="1" max="20" value="1">
    </div>
    <div class="slider-row">
      <div class="slider-meta">
        <span class="slider-label" style="color:var(--amber);">Height (H)</span>
        <span id="h-val" style="color:var(--amber);font-weight:600;">1</span>
      </div>
      <input type="range" id="h-slider" class="amber" min="1" max="20" value="1">
    </div>
  </div>
</div>

<canvas id="cel-canvas"></canvas>
<div class="overlay" id="overlay">
  <div class="ov-icon">🛡️</div>
  <div class="ov-title" id="ov-title">Panel Fitted</div>
  <div class="ov-sub" id="ov-sub"></div>
  <button class="ov-btn" id="ov-next">Next Level →</button>
  <button class="ov-btn sec" id="ov-home">← Fleet Commander</button>
  <div class="ov-voss" id="ov-voss">
    <div class="ov-voss-face">
      <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="22" r="22" fill="#12103a"/>
        <path d="M6,44 Q8,30 22,28 Q36,30 38,44 Z" fill="#201008"/>
        <path d="M15,31 L22,28 L29,31 L22,35 Z" fill="#ff7040" opacity=".65"/>
        <ellipse cx="22" cy="17" rx="11" ry="12" fill="#d4a870"/>
        <path d="M11,13 Q12,4 22,4 Q32,4 33,13 Q28,7 22,7 Q16,7 11,13 Z" fill="#2a2a2a"/>
        <ellipse cx="18" cy="17" rx="2" ry="2.2" fill="#2244cc"/>
        <ellipse cx="26" cy="17" rx="2" ry="2.2" fill="#2244cc"/>
        <path d="M18,25 Q22,28 26,25" stroke="#c4906a" stroke-width="1.2" fill="none"/>
        <rect x="14" y="32" width="16" height="2.5" rx="1.25" fill="#ff7040" opacity=".7"/>
        <circle cx="18" cy="33.25" r=".9" fill="#e8c840"/>
        <circle cx="22" cy="33.25" r=".9" fill="#e8c840"/>
        <circle cx="26" cy="33.25" r=".9" fill="#e8c840"/>
      </svg>
    </div>
    <div class="ov-voss-txt" id="ov-voss-txt">"Hull integrity: 100%!"</div>
  </div>
</div>

<script>
// ── Level data ──
// goal: 'area' | 'perim' | 'both' | 'maxarea'
// target values; tolerance for continuous win check

const LEVELS = [
  {
    id: 36,
    title: 'Area Only',
    flavor: 'Cut panels to cover the right area. Perimeter doesn\'t matter here — any shape that fits.',
    goal: 'area',
    tasks: [
      { targetArea:24, hint:'<strong>Area = W × H = 24</strong>. Try 4×6, or 3×8, or 2×12 — all work!' },
      { targetArea:36, hint:'<strong>Area = W × H = 36</strong>. Many factor pairs exist. Find any one.' },
      { targetArea:20, hint:'<strong>Area = W × H = 20</strong>. Which pairs of numbers multiply to 20?' },
    ],
    tolerance: 0, maxSlider: 20
  },
  {
    id: 37,
    title: 'Perimeter Only',
    flavor: 'Panel must fit the exact frame edge length. Area doesn\'t matter — match the perimeter.',
    goal: 'perim',
    tasks: [
      { targetPerim:20, hint:'<strong>Perimeter = 2W + 2H = 20</strong>, so W + H = 10. Try 5×5, or 4×6, or 3×7.' },
      { targetPerim:24, hint:'<strong>2W + 2H = 24</strong>, so W + H = 12. Multiple rectangles qualify.' },
      { targetPerim:16, hint:'<strong>2W + 2H = 16</strong>, so W + H = 8. Find one.' },
    ],
    tolerance: 0, maxSlider: 15
  },
  {
    id: 38,
    title: 'Area and Perimeter',
    flavor: 'Exact specifications: both area and perimeter must match. One unique solution.',
    goal: 'both',
    tasks: [
      { targetArea:12, targetPerim:14, hint:'<strong>Area=12, Perimeter=14</strong>. W+H=7 and W×H=12 → W=3, H=4.' },
      { targetArea:18, targetPerim:18, hint:'<strong>Area=18, Perimeter=18</strong>. W+H=9 and W×H=18 → W=3, H=6.' },
      { targetArea:16, targetPerim:16, hint:'<strong>Area=16, Perimeter=16</strong>. W+H=8 and W×H=16 → W=4, H=4.' },
    ],
    tolerance: 0, maxSlider: 15
  },
  {
    id: 39,
    title: 'Composite Panel',
    flavor: 'Two rectangular sections joined as one L-shaped panel. Find total area.',
    goal: 'composite',
    tasks: [
      { r1:{w:4,h:3}, r2:{w:2,h:2}, targetArea:16, hint:'<strong>Total area = (4×3) + (2×2) = 12 + 4 = 16</strong>. Adjust W and H for each part.' },
      { r1:{w:5,h:2}, r2:{w:3,h:3}, targetArea:19, hint:'<strong>Total area = (5×2) + (3×3) = 10 + 9 = 19</strong>.' },
      { r1:{w:6,h:2}, r2:{w:2,h:4}, targetArea:20, hint:'<strong>Total area = (6×2) + (2×4) = 12 + 8 = 20</strong>.' },
    ],
    tolerance: 0, maxSlider: 12
  },
  {
    id: 40,
    title: 'Optimal Shape',
    flavor: 'Fixed perimeter of 20. Make the panel as large as possible — what shape maximises area?',
    goal: 'maxarea',
    tasks: [
      { fixedPerim:20, maxArea:25, hint:'<strong>Perimeter = 20 (fixed)</strong>. W+H must equal 10. Which W and H gives the biggest area? Try different combos.' },
    ],
    tolerance: 0, maxSlider: 10
  }
];

// ── State ──
const SAVE_KEY   = 'spacecrew_progress_v1';
const BASE_LEVEL = 36;
const TOTAL      = LEVELS.length;
let levelIdx = 0, taskIdx = 0, lv = null, task = null;
let W_val = 1, H_val = 1, W2_val = 1, H2_val = 1;
let won = false, stableFrames = 0;
const STABLE = 45;

// ── Persistence ──
function loadSaved() {
  try { const r=localStorage.getItem(SAVE_KEY); if(r) return JSON.parse(r).blast||0; } catch(e){}
  return 0;
}
function writeSaved(n) {
  try {
    const def={o2:0,fuel:0,nav:0,power:0,med:0,docking:0,blast:0};
    const r=localStorage.getItem(SAVE_KEY);
    const p=r?Object.assign(def,JSON.parse(r)):def;
    p.blast=Math.max(p.blast||0,n);
    localStorage.setItem(SAVE_KEY,JSON.stringify(p));
  }catch(e){}
}

// ── Compute metrics ──
function area(w,h) { return w*h; }
function perim(w,h) { return 2*w + 2*h; }

// ── Check win ──
function checkWin() {
  if (won) return;
  let pass = false;
  const a = area(W_val, H_val);
  const p = perim(W_val, H_val);

  if (lv.goal === 'area')      pass = (a === task.targetArea);
  else if (lv.goal === 'perim') pass = (p === task.targetPerim);
  else if (lv.goal === 'both')  pass = (a === task.targetArea && p === task.targetPerim);
  else if (lv.goal === 'maxarea') {
    // perimeter must equal fixedPerim, area must equal maxArea (square: W=H=5)
    pass = (p === task.fixedPerim && a === task.maxArea);
  } else if (lv.goal === 'composite') {
    const total = area(task.r1.w, task.r1.h) + area(task.r2.w, task.r2.h);
    pass = (total === task.targetArea);
  }

  if (pass) {
    stableFrames++;
    if (stableFrames >= STABLE) triggerWin();
  } else {
    stableFrames = 0;
  }
}

// ── Update display ──
function updateDisplay() {
  const a = area(W_val, H_val);
  const p = perim(W_val, H_val);

  // for composite, compute differently
  let displayArea = a, aMatch = false, pMatch = false;

  if (lv.goal === 'composite') {
    displayArea = area(task.r1.w, task.r1.h) + area(task.r2.w, task.r2.h);
    aMatch = (displayArea === task.targetArea);
  } else if (lv.goal === 'area')    { aMatch = (a === task.targetArea); }
  else if (lv.goal === 'perim')   { pMatch = (p === task.targetPerim); }
  else if (lv.goal === 'both')    { aMatch = (a === task.targetArea); pMatch = (p === task.targetPerim); }
  else if (lv.goal === 'maxarea') { pMatch = (p === task.fixedPerim); aMatch = (a === task.maxArea); }

  // area card
  document.getElementById('cur-area').textContent  = lv.goal === 'composite' ? displayArea : a;
  document.getElementById('cur-area').className    = 'mc-val' + (aMatch ? ' match' : '');

  // perim card
  document.getElementById('cur-perim').textContent = p;
  document.getElementById('cur-perim').className   = 'mc-val' + (pMatch ? ' match' : '');

  // target labels
  const tgtArea  = document.getElementById('tgt-area');
  const tgtPerim = document.getElementById('tgt-perim');
  if (lv.goal === 'area' || lv.goal === 'both')      { tgtArea.textContent  = 'target: ' + task.targetArea;  tgtArea.className  = 'mc-target' + (aMatch ? ' hit' : ''); }
  else if (lv.goal === 'composite')                  { tgtArea.textContent  = 'target: ' + task.targetArea;  tgtArea.className  = 'mc-target' + (aMatch ? ' hit' : ''); }
  else if (lv.goal === 'maxarea')                    { tgtArea.textContent  = 'max: ' + task.maxArea;         tgtArea.className  = 'mc-target' + (aMatch ? ' hit' : ''); }
  else                                               { tgtArea.textContent  = 'any value'; tgtArea.className = 'mc-target'; }

  if (lv.goal === 'perim' || lv.goal === 'both')     { tgtPerim.textContent = 'target: ' + task.targetPerim; tgtPerim.className = 'mc-target' + (pMatch ? ' hit' : ''); }
  else if (lv.goal === 'maxarea')                    { tgtPerim.textContent = 'fixed: '  + task.fixedPerim;  tgtPerim.className = 'mc-target' + (pMatch ? ' hit' : ''); }
  else                                               { tgtPerim.textContent = 'any value'; tgtPerim.className = 'mc-target'; }

  // rectangle preview
  const pw  = document.getElementById('preview-wrap');
  const pr  = document.getElementById('panel-rect');
  const maxDim  = Math.max(W_val, H_val, 1);
  const maxPx   = Math.min(pw.clientWidth - 60, 180);
  const scale   = maxPx / (lv.maxSlider || 20);
  const rectW   = Math.max(16, W_val * scale);
  const rectH   = Math.max(16, H_val * scale);
  pr.style.width  = rectW + 'px';
  pr.style.height = rectH + 'px';
  pr.className    = 'panel-rect' + ((aMatch || pMatch) ? ' match' : '');
  document.getElementById('dim-w').textContent = W_val;
  document.getElementById('dim-h').textContent = H_val;
  document.getElementById('w-val').textContent = W_val;
  document.getElementById('h-val').textContent = H_val;
}

// ── Win ──
function triggerWin() {
  if (won) return;
  won = true;
  playWin();

  taskIdx++;
  if (taskIdx < lv.tasks.length) {
    setTimeout(() => { task = lv.tasks[taskIdx]; won = false; stableFrames = 0; updateHint(); updateDisplay(); }, 600);
    return;
  }
  taskIdx = 0;
  const solved = levelIdx + 1;
  writeSaved(solved);
  updatePowerBar(solved);

  const isLast = levelIdx >= TOTAL - 1;
  document.getElementById('ov-title').textContent = lv.title + ' — Complete';
  document.getElementById('ov-sub').textContent = isLast
    ? 'All blast panels fabricated. Mission complete!'
    : `Level ${BASE_LEVEL + levelIdx} complete. ${TOTAL - solved} level${TOTAL-solved===1?'':'s'} remain.`;
  const next = document.getElementById('ov-next');
  if (isLast) {
    next.textContent = 'Back to Fleet →';
    next.onclick = () => { window.location.href = 'mission_select.html#blast=' + solved; };
  } else {
    next.textContent = `Level ${BASE_LEVEL + solved} →`;
    next.onclick = () => { document.getElementById('overlay').classList.remove('show'); levelIdx++; loadLevel(); };
  }
  ariaReact('correct');
  launchCelebration();
  document.getElementById('ov-voss-txt').textContent = VOSS_QUIPS_BLAST[Math.floor(Math.random()*VOSS_QUIPS_BLAST.length)];
  setTimeout(() => document.getElementById('overlay').classList.add('show'), 400);
}

function updateHint() {
  document.getElementById('hint-panel').innerHTML = lv.tasks[taskIdx]?.hint || '';
}

function loadLevel() {
  lv    = LEVELS[levelIdx];
  task  = lv.tasks[0];
  taskIdx = 0; won = false; stableFrames = 0;
  W_val = 1; H_val = 1;
  document.getElementById('w-slider').max   = lv.maxSlider || 20;
  document.getElementById('h-slider').max   = lv.maxSlider || 20;
  document.getElementById('w-slider').value = 1;
  document.getElementById('h-slider').value = 1;
  document.getElementById('hud-title').textContent  = lv.title;
  document.getElementById('hud-flavor').textContent = lv.flavor;
  document.getElementById('hud-level').textContent  = BASE_LEVEL + levelIdx;
  updateHint();
  updateDisplay();
}

function updatePowerBar(n) {
  const pct = Math.round(n / TOTAL * 100);
  const f = document.getElementById('power-fill');
  f.style.width = pct+'%';
  f.className = 'power-fill' + (pct>=100?' maxed':'');
  document.getElementById('power-pct').textContent = pct+'%';
}

// ── Sliders ──
document.getElementById('w-slider').addEventListener('input', function() { W_val = parseInt(this.value); updateDisplay(); });
document.getElementById('h-slider').addEventListener('input', function() { H_val = parseInt(this.value); updateDisplay(); });

// ── rAF loop ──
function loop() { checkWin(); requestAnimationFrame(loop); }

// ── Audio ──
let _ctx=null;
function _ac(){if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();if(_ctx.state==='suspended')_ctx.resume();return _ctx;}
function playWin() {
  try {
    const c=_ac(),notes=[523,659,784,1047];
    notes.forEach((freq,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type='sine';o.frequency.value=freq;
      const t=c.currentTime+i*0.13;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.14,t+0.04);g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
      o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+0.28);
    });
  }catch(e){}
}

document.getElementById('ov-home').addEventListener('click', () => { window.location.href='mission_select.html#blast='+loadSaved(); });

// ══ ARIA companion ════════════════════════════════════════════════
const ARIA_MSGS_BLAST={idle:["Adjust width and height to hit the target!","Area = Width × Height!","Perimeter = 2×(W+H)!","Geometry shields the ship!"],correct:["⭐ Panel fits perfectly!","Area and perimeter nailed!","Shield geometry mastered!","The hull is protected — nice work!"],wrong:[]};
let _ariaTimerB=null;
function ariaSetMsg(msg){const el=document.getElementById('aria-msg');if(!el)return;clearTimeout(_ariaTimerB);el.textContent='';let i=0;(function t(){if(i<msg.length){el.textContent+=msg[i++];_ariaTimerB=setTimeout(t,20);}})();}
function ariaReact(type){const w=document.getElementById('aria-wrap');if(!w)return;const pool=ARIA_MSGS_BLAST[type]||ARIA_MSGS_BLAST.idle;if(!pool.length)return;ariaSetMsg(pool[Math.floor(Math.random()*pool.length)]);w.className='aria-wrap';void w.offsetWidth;if(type==='correct'){w.className='aria-wrap aria-happy';setTimeout(()=>{w.className='aria-wrap';},700);}else if(type==='wrong'){w.className='aria-wrap aria-sad';setTimeout(()=>{w.className='aria-wrap';},500);}}
function ariaTap(){const w=document.getElementById('aria-wrap');if(!w)return;w.className='aria-wrap';void w.offsetWidth;const msgs=["I'm ARIA — your AI navigator!","Area fills the inside space!","Perimeter goes around the edge!","Geometry guards the crew!"];ariaSetMsg(msgs[Math.floor(Math.random()*msgs.length)]);w.style.transform='rotateY(360deg)';setTimeout(()=>{w.style.transform='';},500);}
(function ariaIdle(){setTimeout(()=>{if(!document.getElementById('overlay').classList.contains('show'))ariaSetMsg(ARIA_MSGS_BLAST.idle[Math.floor(Math.random()*ARIA_MSGS_BLAST.idle.length)]);ariaIdle();},10000);})();

// ══ Flying panels celebration ══════════════════════════════════════
const VOSS_QUIPS_BLAST=['"Shield panels secured! Hull integrity 100%!"','"Area and perimeter: mastered!"','"That\'s exactly the right geometry!"','"Blast shield holding. Great spatial thinking!"','"The ship is protected thanks to your precision!"'];
function launchCelebration(){
  const canvas=document.getElementById('cel-canvas');if(!canvas)return;
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;canvas.classList.add('active');
  const ctx=canvas.getContext('2d');
  const panels=[],rivets=[];
  const cols=['#ff7040','#f0b040','rgba(255,112,64,.7)','rgba(240,176,64,.7)'];
  for(let i=0;i<25;i++){const side=Math.random()>.5;panels.push({x:side?-80:canvas.width+80,y:50+Math.random()*(canvas.height-100),vx:side?4+Math.random()*6:-(4+Math.random()*6),vy:(Math.random()-.5)*3,w:30+Math.random()*50,h:20+Math.random()*35,rot:(Math.random()-.5)*.4,vrot:(Math.random()-.5)*.04,c:cols[i%cols.length],life:1,d:.007+Math.random()*.008});}
  for(let i=0;i<60;i++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*5;rivets.push({x:canvas.width/2+(Math.random()-.5)*200,y:canvas.height/2+(Math.random()-.5)*100,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,r:2+Math.random()*3,c:'#f0b040',life:1,d:.02+Math.random()*.015});}
  (function frame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    panels.forEach(p=>{if(p.life<=0)return;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vrot;p.life-=p.d;p.vx*=.97;p.vy*=.98;ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.c;ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.rotate(p.rot);ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.strokeRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});
    rivets.forEach(p=>{if(p.life<=0)return;p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life-=p.d;ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();});
    const alive=panels.some(p=>p.life>0)||rivets.some(p=>p.life>0);
    if(alive)requestAnimationFrame(frame);else{canvas.classList.remove('active');ctx.clearRect(0,0,canvas.width,canvas.height);}
  })();
}

(function init() {
  const saved = loadSaved();
  levelIdx = Math.min(saved, TOTAL-1);
  updatePowerBar(saved);
  loadLevel();
  requestAnimationFrame(loop);
})();
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js').catch(() => {}); }
