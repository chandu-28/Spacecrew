<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#cc44ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fuel">
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <title>Fuel Reactor — Space Crew</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --accent:#cc44ff;
      --bg-deep:#06060f;--bg-panel:#0d0d1e;--bg-inset:#111122;--bg-raised:#161630;
      --border-dim:rgba(80,80,160,0.18);--border-glow:rgba(100,100,220,0.4);
      --text-bright:#eeeef8;--text-mid:#8888aa;--text-dim:#44445a;
      --green:#44dd88;--red:#ff4455;--r8:8px;--r10:10px;--r12:12px;
    }
    html{min-height:100%;width:100%;}
    body{min-height:100%;width:100%;overflow-x:hidden;overflow-y:auto;
      background:radial-gradient(ellipse 70% 50% at 10% 70%,rgba(204,68,255,0.055) 0%,transparent 100%),
        radial-gradient(ellipse 55% 65% at 88% 15%,rgba(160,40,255,0.065) 0%,transparent 100%),#06060f;
      color:var(--text-bright);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      -webkit-tap-highlight-color:transparent;}
    @view-transition{navigation:auto;}
    @keyframes vt-up{from{opacity:0;transform:translateY(10px);}}
    @keyframes vt-down{to{opacity:0;transform:translateY(-8px);}}
    ::view-transition-old(root){animation:.22s ease vt-down;}
    ::view-transition-new(root){animation:.28s ease vt-up;}
    #bg-stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
    #app{position:relative;z-index:1;padding:10px;width:100%;max-width:540px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom,20px);}
    .glass{background:rgba(6,6,22,0.52);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:0.5px solid rgba(204,68,255,0.12);border-radius:var(--r12);box-shadow:0 8px 32px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.03);}
    .aria-bar{display:flex;align-items:center;gap:10px;padding:7px 10px;margin-bottom:7px;}
    .aria-wrap{width:48px;height:48px;flex-shrink:0;cursor:pointer;animation:aria-bob 2.2s ease-in-out infinite;}
    @keyframes aria-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    .aria-wrap.aria-happy{animation:aria-bounce .55s ease forwards;}
    @keyframes aria-bounce{0%,100%{transform:scale(1) translateY(0)}35%{transform:scale(1.18) translateY(-6px)}65%{transform:scale(.96) translateY(1px)}}
    .aria-wrap.aria-sad{animation:aria-wag .4s ease forwards;}
    @keyframes aria-wag{0%,100%{transform:rotate(0)}30%{transform:rotate(-9deg)}70%{transform:rotate(9deg)}}
    .aria-bubble{flex:1;position:relative;background:rgba(204,68,255,0.04);border:0.5px solid rgba(204,68,255,0.12);border-radius:var(--r10);padding:6px 10px;min-height:36px;}
    .aria-bubble::before{content:'';position:absolute;left:-7px;top:50%;transform:translateY(-50%);border:4px solid transparent;border-right-color:rgba(204,68,255,0.12);}
    .aria-name{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);display:block;margin-bottom:1px;}
    .aria-msg{font-size:11px;color:var(--text-bright);line-height:1.4;}
    .hud{padding:9px 12px;margin-bottom:7px;}
    #lv-name{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:.1em;font-weight:600;text-transform:uppercase;margin-bottom:3px;background:linear-gradient(90deg,var(--accent) 0%,#eeb4ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    #lv-flavor{font-size:11px;color:var(--text-mid);font-style:italic;line-height:1.35;}
    .power-wrap{margin-bottom:7px;}
    .power-meta{display:flex;justify-content:space-between;font-size:9px;color:var(--text-dim);letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px;}
    .power-track{height:7px;background:var(--bg-inset);border:0.5px solid rgba(68,221,136,0.1);border-radius:4px;overflow:hidden;}
    .power-fill{height:100%;width:0%;border-radius:4px;background:var(--green);box-shadow:0 0 10px rgba(68,221,136,0.45);}
    .power-fill.charging{background:linear-gradient(90deg,var(--accent),var(--green),var(--accent));background-size:200%;animation:shimmer .7s linear infinite;}
    .power-fill.maxed{background:linear-gradient(90deg,#22aa66,var(--green),#aaffd4,var(--green),#22aa66);background-size:300%;animation:shimmer-max 1.2s linear infinite;box-shadow:0 0 8px 2px rgba(68,221,136,0.4);}
    @keyframes shimmer{0%{background-position:200%}100%{background-position:0%}}
    @keyframes shimmer-max{0%{background-position:300%}100%{background-position:0%}}
    .problem-panel{padding:12px;margin-bottom:7px;}
    .fuel-panel{display:flex;flex-direction:column;gap:9px;margin-bottom:12px;}
    .fb-row{display:flex;align-items:center;gap:9px;}
    .fb-lbl{font-family:'Orbitron',monospace;font-size:9px;font-weight:600;letter-spacing:.08em;width:72px;flex-shrink:0;}
    .fb-lbl.h2c{color:#cc44ff;}.fb-lbl.plc{color:#ff9060;}.fb-lbl.coc{color:#4499ff;}
    .fb-track{flex:1;height:26px;background:var(--bg-inset);border:0.5px solid var(--border-dim);border-radius:6px;overflow:hidden;}
    .fb-fill{height:100%;width:0%;border-radius:6px;transition:width .35s ease;}
    .h2-fill{background:linear-gradient(90deg,rgba(204,68,255,.88),rgba(204,68,255,.28));}
    .pl-fill{background:linear-gradient(90deg,rgba(255,144,96,.88),rgba(255,144,96,.28));}
    .co-fill{background:linear-gradient(90deg,rgba(68,153,255,.88),rgba(68,153,255,.28));}
    .fb-row.unk .fb-fill{transition:width .1s ease;}
    .fb-pct{font-family:'Orbitron',monospace;font-size:15px;font-weight:600;color:var(--text-bright);width:34px;text-align:right;flex-shrink:0;}
    .fb-pct.unknown{color:var(--text-dim);font-size:20px;}
    .fb-row.given .fb-track{border-color:var(--accent);box-shadow:0 0 8px rgba(204,68,255,.2);}
    .fb-row.unk .fb-track{border-color:rgba(204,68,255,.35);}
    .fb-row.correct .fb-track{border-color:var(--green)!important;box-shadow:0 0 14px rgba(68,221,136,.45)!important;animation:correct-pulse .7s ease;}
    @keyframes correct-pulse{0%,100%{box-shadow:0 0 14px rgba(68,221,136,.45)}50%{box-shadow:0 0 30px rgba(68,221,136,.8)}}
    .fb-row.wrong-flash .fb-track{animation:fb-wrong .38s ease;}
    @keyframes fb-wrong{50%{box-shadow:0 0 10px rgba(255,68,85,.6);border-color:var(--red)!important;}}
    .total-row{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;background:var(--bg-inset);border:0.5px solid var(--border-dim);border-radius:var(--r8);}
    .total-lbl{font-size:9px;color:var(--text-dim);letter-spacing:.07em;text-transform:uppercase;}
    .total-val{font-family:'Orbitron',monospace;font-size:20px;font-weight:600;color:var(--text-bright);}
    .total-val.full{color:var(--green);text-shadow:0 0 12px rgba(68,221,136,.5);}
    .total-target{font-size:9px;color:var(--text-dim);letter-spacing:.06em;}
    .question-box{background:var(--bg-inset);border:0.5px solid var(--border-dim);border-radius:var(--r10);padding:9px 12px;text-align:center;}
    .question-text{font-size:12.5px;color:var(--text-mid);line-height:1.6;}
    .question-text strong{color:var(--text-bright);font-weight:600;}
    .answer-section{padding:11px;margin-bottom:7px;}
    .attempts-row{display:flex;gap:8px;justify-content:center;margin-bottom:10px;}
    .att-dot{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--border-glow);background:transparent;transition:background .18s,border-color .18s,box-shadow .18s;}
    .att-dot.wrong{background:var(--red);border-color:var(--red);box-shadow:0 0 8px rgba(255,68,85,.5);}
    .att-dot.correct{background:var(--green);border-color:var(--green);box-shadow:0 0 8px rgba(68,221,136,.5);}
    .answer-display{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--bg-inset);border-radius:var(--r10);border:0.5px solid var(--border-dim);margin-bottom:9px;}
    .answer-prompt{font-size:10px;color:var(--text-dim);letter-spacing:.04em;}
    .answer-digits{font-family:'Orbitron',monospace;font-size:26px;font-weight:600;color:var(--text-bright);min-width:64px;text-align:right;letter-spacing:.05em;transition:color .12s;}
    .answer-digits.empty{color:var(--text-dim);}.answer-digits.correct{color:var(--green);text-shadow:0 0 12px rgba(68,221,136,.5);}.answer-digits.wrong{color:var(--red);}
    .feedback-msg{text-align:center;font-size:13px;font-weight:600;min-height:18px;margin-bottom:7px;letter-spacing:.03em;opacity:0;transition:opacity .18s;}
    .feedback-msg.show{opacity:1;}.feedback-msg.correct{color:var(--green);}.feedback-msg.wrong{color:var(--red);}
    .hint-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:9px;flex-wrap:wrap;}
    .hint-btn{font-size:10px;color:var(--text-dim);cursor:pointer;text-decoration:underline;border:none;background:none;flex-shrink:0;}
    .hint-box{font-size:11px;color:var(--text-mid);background:rgba(6,6,22,.6);backdrop-filter:blur(8px);border:0.5px solid rgba(204,68,255,.14);border-radius:var(--r8);padding:6px 10px;display:none;flex:1;line-height:1.5;}
    .hint-box.show{display:block;}
    .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
    .np-btn{height:clamp(44px,11vw,54px);border:0.5px solid var(--border-glow);border-radius:var(--r10);background:var(--bg-raised);color:var(--text-bright);font-size:19px;font-weight:500;cursor:pointer;touch-action:manipulation;transition:background .1s,box-shadow .1s,transform .07s;-webkit-tap-highlight-color:transparent;}
    .np-btn:active{background:rgba(204,68,255,.1);box-shadow:0 0 10px rgba(204,68,255,.28);transform:scale(0.93);}
    .np-btn.np-confirm{background:rgba(68,221,136,.1);border-color:rgba(68,221,136,.35);color:var(--green);font-size:21px;}
    .np-btn.np-confirm:active{background:rgba(68,221,136,.22);}
    .np-btn.np-back{font-size:21px;color:var(--text-mid);}
    .level-nav{display:flex;gap:6px;align-items:center;justify-content:space-between;}
    .nav-btn{font-size:12px;padding:6px 12px;border:0.5px solid var(--border-glow);border-radius:var(--r8);background:transparent;color:var(--text-bright);cursor:pointer;white-space:nowrap;}
    .nav-btn:active{background:rgba(204,68,255,.08);}
    .dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1;}
    .dot{width:10px;height:10px;border-radius:50%;border:1px solid var(--border-glow);background:transparent;cursor:pointer;}
    .dot.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 7px rgba(204,68,255,.7);}
    .dot.solved{background:var(--green);border-color:var(--green);box-shadow:0 0 7px rgba(68,221,136,.6);}
    .nav-back{font-size:11px;color:var(--text-dim);text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px;transition:color .18s;}
    .nav-back:hover{color:var(--accent);}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0);pointer-events:none;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;transition:background .3s;}
    .modal-bg.show{background:rgba(0,0,0,.65);pointer-events:all;}
    .modal-card{background:rgba(6,6,22,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--green);border-radius:var(--r12);padding:22px 24px;text-align:center;max-width:300px;width:100%;opacity:0;transform:scale(.82);transition:opacity .3s,transform .3s;pointer-events:none;box-shadow:0 0 50px rgba(68,221,136,.18),0 24px 60px rgba(0,0,0,.7);}
    .modal-bg.show .modal-card{opacity:1;transform:scale(1);pointer-events:all;}
    .modal-title{font-size:16px;font-weight:500;color:var(--green);margin-bottom:7px;}
    .modal-body{font-size:13px;color:var(--text-mid);line-height:1.6;margin-bottom:16px;}
    .modal-next{font-size:13px;padding:8px 20px;border:0.5px solid var(--green);border-radius:var(--r8);background:rgba(68,221,136,.08);color:var(--green);cursor:pointer;font-weight:500;}
    .modal-next:active{background:rgba(68,221,136,.18);}
    .modal-home{display:block;margin-top:10px;font-size:11px;color:var(--text-dim);text-decoration:none;}
    .ov-voss{display:flex;align-items:center;gap:10px;background:var(--bg-panel);border:1px solid rgba(204,68,255,.35);border-radius:var(--r12);padding:10px 13px;max-width:300px;width:90%;animation:ov-voss-in .45s ease;margin-top:8px;}
    @keyframes ov-voss-in{from{transform:translateY(18px);opacity:0}to{transform:none;opacity:1}}
    .ov-voss-face{width:44px;height:44px;flex-shrink:0;border-radius:50%;overflow:hidden;border:1.5px solid rgba(204,68,255,.4);}
    .ov-voss-txt{font-size:11px;color:var(--text-mid);line-height:1.5;font-style:italic;}
    #cel-canvas{position:fixed;inset:0;pointer-events:none;z-index:199;display:none;}
    #cel-canvas.active{display:block;}
  </style>
</head>
<body>
<canvas id="bg-stars"></canvas>
<canvas id="cel-canvas"></canvas>
<div id="app">
  <a class="nav-back" href="mission_select.html">← Fleet Commander</a>
  <div class="aria-bar glass">
    <div class="aria-wrap" id="aria-wrap" onclick="ariaTap()">
      <svg viewBox="-2 0 60 70" xmlns="http://www.w3.org/2000/svg">
        <rect x="-2" y="32" width="12" height="8" rx="4" fill="#1e1e42"/>
        <rect x="46" y="32" width="12" height="8" rx="4" fill="#1e1e42"/>
        <rect x="8" y="28" width="40" height="30" rx="10" fill="#1e1e42"/>
        <ellipse cx="28" cy="18" rx="16" ry="15" fill="#242454"/>
        <rect x="12" y="10" width="32" height="14" rx="6" fill="rgba(0,8,28,.5)"/>
        <circle cx="20" cy="17" r="4.5" fill="white"/><circle cx="21" cy="18" r="2.8" fill="#111"/><circle cx="20.3" cy="15.8" r=".9" fill="white"/>
        <circle cx="36" cy="17" r="4.5" fill="white"/><circle cx="37" cy="18" r="2.8" fill="#111"/><circle cx="36.3" cy="15.8" r=".9" fill="white"/>
        <path d="M22,25 Q28,29 34,25" stroke="#cc44ff" stroke-width="2" fill="none" stroke-linecap="round"/>
        <rect x="26" y="2" width="4" height="8" rx="2" fill="#242454"/>
        <circle cx="28" cy="2" r="3.2" fill="#cc44ff"/>
        <rect x="13" y="35" width="30" height="17" rx="5" fill="rgba(204,68,255,.18)"/>
        <circle cx="21" cy="42" r="2.3" fill="#cc44ff" opacity=".9"/>
        <circle cx="28" cy="42" r="2.3" fill="rgba(255,255,255,.35)"/>
        <circle cx="35" cy="42" r="2.3" fill="#cc44ff" opacity=".9"/>
        <rect x="16" y="48" width="24" height="2.5" rx="1.25" fill="#cc44ff" opacity=".4"/>
        <rect x="13" y="56" width="12" height="12" rx="5" fill="#1e1e42"/>
        <rect x="31" y="56" width="12" height="12" rx="5" fill="#1e1e42"/>
      </svg>
    </div>
    <div class="aria-bubble">
      <span class="aria-name">ARIA</span>
      <span class="aria-msg" id="aria-msg">Find the missing fuel level — the reactor needs it!</span>
    </div>
  </div>
  <div class="hud glass">
    <div id="lv-name">Level 1 — Cold Start</div>
    <div id="lv-flavor">Reactor cold start. All three fuels must total 100%.</div>
  </div>
  <div class="power-wrap">
    <div class="power-meta"><span>Ship power grid</span><span id="power-pct">0%</span></div>
    <div class="power-track"><div class="power-fill" id="power-fill"></div></div>
  </div>
  <div class="problem-panel glass">
    <div class="fuel-panel">
      <div class="fb-row given" id="fb-h2">
        <div class="fb-lbl h2c">HYDROGEN</div>
        <div class="fb-track"><div class="fb-fill h2-fill" id="fill-h2"></div></div>
        <div class="fb-pct" id="val-h2">—</div>
      </div>
      <div class="fb-row given" id="fb-pl">
        <div class="fb-lbl plc">PLASMA</div>
        <div class="fb-track"><div class="fb-fill pl-fill" id="fill-pl"></div></div>
        <div class="fb-pct" id="val-pl">—</div>
      </div>
      <div class="fb-row unk" id="fb-co">
        <div class="fb-lbl coc">COOLANT</div>
        <div class="fb-track"><div class="fb-fill co-fill" id="fill-co"></div></div>
        <div class="fb-pct unknown" id="val-co">?</div>
      </div>
      <div class="total-row">
        <span class="total-lbl">Total</span>
        <span class="total-val" id="total-val">—</span>
        <span class="total-target">TARGET: 100%</span>
      </div>
    </div>
    <div class="question-box">
      <div class="question-text" id="question-text">Loading…</div>
    </div>
  </div>
  <div class="answer-section glass">
    <div class="attempts-row">
      <div class="att-dot" id="att-0"></div>
      <div class="att-dot" id="att-1"></div>
      <div class="att-dot" id="att-2"></div>
    </div>
    <div class="answer-display">
      <span class="answer-prompt" id="answer-prompt">Enter Coolant %:</span>
      <span class="answer-digits empty" id="answer-digits">—</span>
    </div>
    <div class="feedback-msg" id="feedback-msg"></div>
    <div class="hint-row">
      <button class="hint-btn" id="hint-btn" onclick="toggleHint()">Show hint</button>
      <div class="hint-box" id="hint-box"></div>
    </div>
    <div class="numpad">
      <button class="np-btn" onclick="numPress('7')">7</button>
      <button class="np-btn" onclick="numPress('8')">8</button>
      <button class="np-btn" onclick="numPress('9')">9</button>
      <button class="np-btn" onclick="numPress('4')">4</button>
      <button class="np-btn" onclick="numPress('5')">5</button>
      <button class="np-btn" onclick="numPress('6')">6</button>
      <button class="np-btn" onclick="numPress('1')">1</button>
      <button class="np-btn" onclick="numPress('2')">2</button>
      <button class="np-btn" onclick="numPress('3')">3</button>
      <button class="np-btn np-back" onclick="numPress('⌫')">⌫</button>
      <button class="np-btn" onclick="numPress('0')">0</button>
      <button class="np-btn np-confirm" onclick="numPress('✓')">✓</button>
    </div>
  </div>
  <div class="level-nav">
    <button class="nav-btn" id="btn-prev">← Prev</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn" id="btn-next">Next →</button>
  </div>
</div>
<div class="modal-bg" id="modal">
  <div class="modal-card">
    <div class="modal-title" id="mc-title">Reactor Online</div>
    <div class="modal-body" id="mc-body"></div>
    <button class="modal-next" id="mc-next">Next Level →</button>
    <a href="mission_select.html" class="modal-home">← Fleet Commander</a>
    <div class="ov-voss" id="ov-voss">
      <div class="ov-voss-face">
        <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
          <circle cx="22" cy="22" r="22" fill="#12103a"/>
          <path d="M6,44 Q8,30 22,28 Q36,30 38,44 Z" fill="#102030"/>
          <path d="M15,31 L22,28 L29,31 L22,35 Z" fill="#cc44ff" opacity=".65"/>
          <ellipse cx="22" cy="17" rx="11" ry="12" fill="#d4a870"/>
          <path d="M11,13 Q12,4 22,4 Q32,4 33,13 Q28,7 22,7 Q16,7 11,13 Z" fill="#2a2a2a"/>
          <ellipse cx="18" cy="17" rx="2" ry="2.2" fill="#2244cc"/>
          <ellipse cx="26" cy="17" rx="2" ry="2.2" fill="#2244cc"/>
          <path d="M18,25 Q22,28 26,25" stroke="#c4906a" stroke-width="1.2" fill="none"/>
          <rect x="14" y="32" width="16" height="2.5" rx="1.25" fill="#cc44ff" opacity=".7"/>
          <circle cx="18" cy="33.25" r=".9" fill="#e8c840"/>
          <circle cx="22" cy="33.25" r=".9" fill="#e8c840"/>
          <circle cx="26" cy="33.25" r=".9" fill="#e8c840"/>
        </svg>
      </div>
      <div class="ov-voss-txt" id="ov-voss-txt">"Reactor stable!"</div>
    </div>
  </div>
</div>
<script>
const LEVELS=[
  {id:1,name:"Cold Start",       q_type:'find_co',h2:60,plasma:20,coolant:null,answer:20,
   question:"Hydrogen is <strong>60%</strong> and Plasma is <strong>20%</strong>. All three fuels must add up to <strong>100%</strong>. What is Coolant?",
   hint:"Add the two known numbers first. Then ask: what must I add to reach 100?",
   flavor:"Reactor cold start. All three fuels must total 100%."},
  {id:2,name:"Plasma Heavy",     q_type:'find_co',h2:30,plasma:45,coolant:null,answer:25,
   question:"Hydrogen is <strong>30%</strong> and Plasma is <strong>45%</strong>. All three must total <strong>100%</strong>. What is Coolant?",
   hint:"Add the two known numbers. How far is that total from 100?",
   flavor:"Entering plasma zone. Coolant must compensate."},
  {id:3,name:"Find the Plasma",  q_type:'find_pl',h2:40,plasma:null,coolant:35,answer:25,
   question:"Hydrogen is <strong>40%</strong> and Coolant is <strong>35%</strong>. All three must total <strong>100%</strong>. What is Plasma?",
   hint:"Add the two known numbers. What's missing to reach 100?",
   flavor:"Plasma feed sensor offline. Calculate from the other readings."},
  {id:4,name:"Hydrogen Unknown", q_type:'find_h2',h2:null,plasma:50,coolant:15,answer:35,
   question:"Plasma is <strong>50%</strong> and Coolant is <strong>15%</strong>. All three must total <strong>100%</strong>. What is Hydrogen?",
   hint:"Add the two known numbers. How far away from 100 are they?",
   flavor:"Hydrogen gauge broken! Work out the correct level."},
  {id:5,name:"Balanced Reactor", q_type:'find_co',h2:25,plasma:40,coolant:null,answer:35,
   question:"Hydrogen is <strong>25%</strong> and Plasma is <strong>40%</strong>. All three must total <strong>100%</strong>. What is Coolant?",

const VOSS_QUIPS=['"Reactor singing at 100%!"','"Fuel mix perfect — by the stars!"','"That\'s precise math, Commander!"','"The reactor thanks you!"','"100% means the crew survives!"'];
let cur=0,solved=new Set(),powerLevel=0;
let answerStr='',attempts=0,levelDone=false,hintShown=false;
let unkType='co',givenTotal=0;
const $=id=>document.getElementById(id);
let _ac=null;
function _ctx(){if(!_ac)try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}if(_ac&&_ac.state==='suspended')_ac.resume();return _ac;}
function playChime(){const c=_ctx();if(!c)return;[523,784,1046].forEach((f,i)=>{try{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;const t=c.currentTime+i*0.1;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.14,t+0.03);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+0.42);}catch(e){}});}
function playError(){const c=_ctx();if(!c)return;try{const t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(90,t+0.18);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.16,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+0.25);}catch(e){}}
function animPower(from,to,dur,maxed){const start=Date.now(),pf=$('power-fill');pf.classList.remove('maxed');pf.classList.add('charging');(function tick(){const t=Math.min(1,(Date.now()-start)/dur),v=from+(to-from)*t;pf.style.width=Math.round(v*100)+'%';$('power-pct').textContent=Math.round(v*100)+'%';if(t<1)requestAnimationFrame(tick);else{pf.classList.remove('charging');if(maxed)pf.classList.add('maxed');}})();}
function buildDots(){const c=$('dots');c.innerHTML='';LEVELS.forEach((l,i)=>{const d=document.createElement('div');d.className='dot'+(i===cur?' active':'')+(solved.has(i)?' solved':'');d.title=l.name;d.onclick=()=>{cur=i;loadLevel();};c.appendChild(d);});}
function setBar(type,val,isGiven){
  const row=$('fb-'+type),fill=$('fill-'+type),valEl=$('val-'+type);
  if(isGiven){row.className='fb-row given';fill.style.width=val+'%';valEl.textContent=val;valEl.className='fb-pct';}
  else{row.className='fb-row unk';fill.style.width='0%';valEl.textContent='?';valEl.className='fb-pct unknown';}
}
function loadLevel(){
  const lv=LEVELS[cur];
  answerStr='';attempts=0;levelDone=false;hintShown=false;
  $('lv-name').textContent=`Level ${lv.id} — ${lv.name}`;
  $('lv-flavor').textContent=lv.flavor;
  if(lv.q_type==='find_co'){setBar('h2',lv.h2,true);setBar('pl',lv.plasma,true);setBar('co',null,false);unkType='co';givenTotal=lv.h2+lv.plasma;$('answer-prompt').textContent='Enter Coolant %:';}
  else if(lv.q_type==='find_pl'){setBar('h2',lv.h2,true);setBar('co',lv.coolant,true);setBar('pl',null,false);unkType='pl';givenTotal=lv.h2+lv.coolant;$('answer-prompt').textContent='Enter Plasma %:';}
  else{setBar('pl',lv.plasma,true);setBar('co',lv.coolant,true);setBar('h2',null,false);unkType='h2';givenTotal=lv.plasma+lv.coolant;$('answer-prompt').textContent='Enter Hydrogen %:';}
  $('total-val').textContent=givenTotal+' + ?';$('total-val').className='total-val';
  $('question-text').innerHTML=lv.question;$('hint-box').innerHTML=lv.hint;
  $('hint-box').classList.remove('show');$('hint-btn').textContent='Show hint';
  clearFeedback();_resetDots();_renderDigits();buildDots();
  if(cur===0)ariaSetMsg('Tap a number, then press ✓ to confirm!');else ariaReact('idle');
}
function _resetDots(){for(let i=0;i<3;i++){const d=$('att-'+i);if(d)d.className='att-dot';}}
function _renderDigits(){const el=$('answer-digits');el.textContent=answerStr===''?'—':answerStr;el.className='answer-digits'+(answerStr===''?' empty':'');}
function _renderPreview(){
  const fill=$('fill-'+unkType),valEl=$('val-'+unkType),totalEl=$('total-val');
  if(answerStr===''){fill.style.width='0%';valEl.textContent='?';valEl.className='fb-pct unknown';totalEl.textContent=givenTotal+' + ?';totalEl.className='total-val';return;}
  const v=parseInt(answerStr);
  if(!isNaN(v)){fill.style.width=Math.min(v,100)+'%';valEl.textContent=v;valEl.className='fb-pct';const rt=givenTotal+v;totalEl.textContent=rt+'%';totalEl.className='total-val'+(rt===100?' full':'');}
}
function showFeedback(msg,type){const el=$('feedback-msg');if(!el)return;el.textContent=msg;el.className='feedback-msg '+type;void el.offsetWidth;el.classList.add('show');}
function clearFeedback(){const el=$('feedback-msg');if(!el)return;el.className='feedback-msg';el.textContent='';}
function numPress(k){if(levelDone)return;clearFeedback();if(k==='⌫')answerStr=answerStr.slice(0,-1);else if(k==='✓'){submitAnswer();return;}else if(answerStr.length<3)answerStr+=k;_renderDigits();_renderPreview();}
function submitAnswer(){if(levelDone||answerStr==='')return;parseInt(answerStr)===LEVELS[cur].answer?handleCorrect():handleWrong();}
function handleCorrect(){
  const lv=LEVELS[cur];levelDone=true;
  $('fb-'+unkType).className='fb-row correct';
  $('fill-'+unkType).style.width=lv.answer+'%';
  $('val-'+unkType).textContent=lv.answer;$('val-'+unkType).className='fb-pct';
  $('total-val').textContent='100%';$('total-val').className='total-val full';
  const el=$('answer-digits');el.textContent=lv.answer;el.className='answer-digits correct';
  for(let i=attempts;i<3;i++){const d=$('att-'+i);if(d)d.classList.add('correct');}
  showFeedback('✓ Correct!','correct');playChime();if(navigator.vibrate)navigator.vibrate(50);
  solved.add(cur);buildDots();
  const prev=powerLevel;powerLevel=Math.min(1,powerLevel+1/LEVELS.length);
  animPower(prev,powerLevel,900,Math.round(powerLevel*100)===100);
  try{const p=JSON.parse(localStorage.getItem('spacecrew_progress_v1')||'{}');p.fuel=Math.max(p.fuel||0,solved.size);localStorage.setItem('spacecrew_progress_v1',JSON.stringify(p));}catch(e){}
  ariaReact('correct');launchCelebration();
  if(cur===LEVELS.length-1){
    $('mc-title').textContent='Reactor Online';
    $('mc-body').innerHTML='Fuel mix perfect. The reactor hums with power.<br><em>All levels complete. Mission accomplished!</em>';
    const btn=$('mc-next');btn.textContent='Replay from start';
    btn.onclick=()=>{$('modal').classList.remove('show');cur=0;solved=new Set();powerLevel=0;const pf=$('power-fill');pf.style.width='0%';pf.classList.remove('maxed','charging');$('power-pct').textContent='0%';loadLevel();};
    if($('ov-voss-txt'))$('ov-voss-txt').textContent=VOSS_QUIPS[Math.floor(Math.random()*VOSS_QUIPS.length)];
    setTimeout(()=>$('modal').classList.add('show'),1800);
  }else{setTimeout(()=>{cur++;loadLevel();},1600);}
}
function handleWrong(){
  const d=$('att-'+Math.min(attempts,2));if(d)d.classList.add('wrong');
  attempts=Math.min(attempts+1,3);
  $('answer-digits').className='answer-digits wrong';
  $('fb-'+unkType).classList.add('wrong-flash');
  setTimeout(()=>{$('fb-'+unkType).classList.remove('wrong-flash');},400);
  setTimeout(()=>{answerStr='';_renderDigits();_renderPreview();},400);
  showFeedback('✗ Wrong — try again!','wrong');playError();if(navigator.vibrate)navigator.vibrate([60,30,60]);
  ariaReact('wrong');
  if(attempts>=2&&!hintShown){hintShown=true;$('hint-box').classList.add('show');$('hint-btn').textContent='Hide hint';ariaSetMsg('Hint unlocked — think step by step!');}
}
function toggleHint(){hintShown=!hintShown;$('hint-box').classList.toggle('show',hintShown);$('hint-btn').textContent=hintShown?'Hide hint':'Show hint';}
$('btn-prev').onclick=()=>{if(cur>0){cur--;loadLevel();}};
$('btn-next').onclick=()=>{if(cur<LEVELS.length-1){cur++;loadLevel();}};
document.addEventListener('keydown',e=>{if($('modal').classList.contains('show'))return;if(e.key>='0'&&e.key<='9')numPress(e.key);else if(e.key==='Backspace')numPress('⌫');else if(e.key==='Enter')numPress('✓');});
try{const sv=JSON.parse(localStorage.getItem('spacecrew_progress_v1')||'{}');const n=sv.fuel||0;for(let i=0;i<n&&i<LEVELS.length;i++)solved.add(i);powerLevel=solved.size/LEVELS.length;const pf=$('power-fill');pf.style.width=Math.round(powerLevel*100)+'%';$('power-pct').textContent=Math.round(powerLevel*100)+'%';if(Math.round(powerLevel*100)===100)pf.classList.add('maxed');}catch(e){}
loadLevel();
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
const ARIA_MSGS={
  idle:["Find the missing fuel level!","Three fuels must total 100%!","Add what you know, count to 100!","You've got this, Commander!"],
  correct:["⭐ Reactor fueled! Brilliant!","Perfect mix — 100% achieved!","The crew is warm and powered!","Math saves the day again!"],
  wrong:["Not quite — check your addition!","What's left to reach 100?","Almost — count more carefully!","Try once more!"],
};
let _ariaT=null;
function ariaSetMsg(msg){const el=$('aria-msg');if(!el)return;clearTimeout(_ariaT);el.textContent='';let i=0;(function t(){if(i<msg.length){el.textContent+=msg[i++];_ariaT=setTimeout(t,18);}})();}
function ariaReact(type){const w=$('aria-wrap');if(!w)return;const pool=ARIA_MSGS[type]||ARIA_MSGS.idle;ariaSetMsg(pool[Math.floor(Math.random()*pool.length)]);w.className='aria-wrap';void w.offsetWidth;if(type==='correct'){w.className='aria-wrap aria-happy';setTimeout(()=>{w.className='aria-wrap';},700);}else if(type==='wrong'){w.className='aria-wrap aria-sad';setTimeout(()=>{w.className='aria-wrap';},500);}}
function ariaTap(){const w=$('aria-wrap');if(!w)return;const msgs=["I'm ARIA — your AI navigator!","Three numbers must sum to 100!","Add the knowns, find the gap!","Math powers the reactor!"];ariaSetMsg(msgs[Math.floor(Math.random()*msgs.length)]);w.style.transform='rotateY(360deg)';setTimeout(()=>{w.style.transform='';},500);}
(function idleLoop(){setTimeout(()=>{if(!$('modal').classList.contains('show'))ariaSetMsg(ARIA_MSGS.idle[Math.floor(Math.random()*ARIA_MSGS.idle.length)]);idleLoop();},12000);})();
function launchCelebration(){const canvas=$('cel-canvas');if(!canvas)return;canvas.width=window.innerWidth;canvas.height=window.innerHeight;canvas.classList.add('active');const ctx=canvas.getContext('2d');const cols=['#cc44ff','#44dd88','#ff9060','#eeb4ff','#44ffcc'];const bubbles=[];for(let i=0;i<60;i++)bubbles.push({x:Math.random()*canvas.width,y:canvas.height+20+Math.random()*100,vy:-(1+Math.random()*3.5),vx:(Math.random()-.5)*1.5,r:5+Math.random()*18,c:cols[i%cols.length],life:1,d:.006+Math.random()*.008,wobble:Math.random()*Math.PI*2,ws:.04+Math.random()*.06});(function frame(){ctx.clearRect(0,0,canvas.width,canvas.height);let alive=false;bubbles.forEach(p=>{if(p.life<=0)return;alive=true;p.x+=p.vx+Math.sin(p.wobble)*0.8;p.y+=p.vy;p.wobble+=p.ws;p.life-=p.d;ctx.save();ctx.globalAlpha=Math.max(0,p.life*.7);ctx.strokeStyle=p.c;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=Math.max(0,p.life*.2);ctx.fillStyle=p.c;ctx.fill();ctx.globalAlpha=Math.max(0,p.life*.5);ctx.fillStyle='rgba(255,255,255,.6)';ctx.beginPath();ctx.arc(p.x-p.r*.3,p.y-p.r*.35,p.r*.25,0,Math.PI*2);ctx.fill();ctx.restore();});if(alive)requestAnimationFrame(frame);else{canvas.classList.remove('active');ctx.clearRect(0,0,canvas.width,canvas.height);}})();}
</script>
<script>
(function(){const c=document.getElementById('bg-stars');if(!c)return;const ctx=c.getContext('2d');let W,H,stars,paused=false;function init(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;stars=Array.from({length:55},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.2,vy:0.04+Math.random()*0.1,o:0.15+Math.random()*0.45}));}function draw(){ctx.clearRect(0,0,W,H);if(!paused)stars.forEach(s=>{ctx.globalAlpha=s.o;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();s.y+=s.vy;if(s.y>H+2){s.y=-2;s.x=Math.random()*W;}});ctx.globalAlpha=1;requestAnimationFrame(draw);}document.addEventListener('visibilitychange',()=>{paused=document.hidden;});window.addEventListener('resize',init);init();draw();})();
</script>
