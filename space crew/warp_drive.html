<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#06060f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Warp Drive">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>Warp Drive — Space Crew</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-deep:#06060f; --bg-panel:#0d0d1e; --bg-inset:#111122; --bg-raised:#161630;
      --border-dim:rgba(80,80,160,0.18); --border-glow:rgba(100,100,220,0.4);
      --text-bright:#eeeef8; --text-mid:#8888aa; --text-dim:#44445a;
      --cyan:#00d4d4; --blue:#4488ff; --purple:#9f60ff; --magenta:#cc44ff;
      --amber:#f0b040; --green:#44dd88; --red:#ff4455;
      --r8:8px; --r10:10px; --r12:12px;
    }
    html { min-height:100%; width:100%; overflow-y:scroll; }
    body {
      min-height:100%; width:100%; overflow-x:hidden; overflow-y:auto;
      background:var(--bg-deep); color:var(--text-bright);
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color:transparent; overscroll-behavior-x:none;
    }
    #app { padding:10px; width:100%; max-width:600px; margin:0 auto; padding-bottom:env(safe-area-inset-bottom,24px); }
    .nav-back { font-size:11px; color:var(--text-dim); text-decoration:none; display:inline-flex; align-items:center; gap:4px; margin-bottom:8px; }
    .hud { background:var(--bg-panel); border:0.5px solid var(--border-dim); border-radius:var(--r12); padding:10px 12px; margin-bottom:8px; display:flex; gap:10px; align-items:flex-start; }
    .hud-main { flex:1; min-width:0; }
    .hud-lbl  { font-size:9px; color:var(--text-dim); letter-spacing:.08em; text-transform:uppercase; margin-bottom:2px; }
    .hud-text { font-size:12px; color:var(--text-bright); font-weight:500; line-height:1.3; }
    .hud-flavor { font-size:11px; color:var(--text-mid); font-style:italic; margin-top:2px; line-height:1.3; }
    .hud-num  { font-size:22px; font-weight:500; color:var(--cyan); line-height:1; }
    .power-wrap { margin-bottom:10px; }
    .power-meta { display:flex; justify-content:space-between; font-size:9px; color:var(--text-dim); letter-spacing:.07em; text-transform:uppercase; margin-bottom:3px; }
    .power-track { height:8px; background:var(--bg-inset); border:0.5px solid var(--border-dim); border-radius:4px; overflow:hidden; }
    .power-fill { height:100%; width:0%; border-radius:4px; background:var(--cyan); transition:width .6s ease; }
    .power-fill.maxed { background:linear-gradient(90deg,#009898,var(--cyan),#aaffff,var(--cyan),#009898); background-size:300%; animation:shimmer 1.2s linear infinite; }
    @keyframes shimmer { 0%{background-position:300%} 100%{background-position:0%} }

    /* ══ ARIA companion ══════════════════════════════════════════ */
    :root{--aria-color:#00d4d4;--aria-chest:rgba(0,212,212,.18);}
    .aria-bar{display:flex;align-items:center;gap:10px;background:var(--bg-panel);border:0.5px solid var(--border-dim);border-radius:var(--r12);padding:8px 10px;margin-bottom:8px;}
    .aria-wrap{width:52px;height:52px;flex-shrink:0;cursor:pointer;animation:aria-bob 2.2s ease-in-out infinite;}
    @keyframes aria-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    .aria-wrap.aria-happy{animation:aria-bounce .55s ease;}
    @keyframes aria-bounce{0%,100%{transform:scale(1) translateY(0)}35%{transform:scale(1.2) translateY(-7px)}65%{transform:scale(.95) translateY(1px)}}
    .aria-wrap.aria-sad{animation:aria-wag .4s ease;}
    @keyframes aria-wag{0%,100%{transform:rotate(0)}30%{transform:rotate(-9deg)}70%{transform:rotate(9deg)}}
    .aria-bubble{flex:1;position:relative;background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.1);border-radius:var(--r10);padding:7px 10px;min-height:38px;}
    .aria-bubble::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);border:5px solid transparent;border-right-color:rgba(255,255,255,.1);}
    .aria-name{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--aria-color);display:block;margin-bottom:2px;}
    .aria-msg{font-size:11.5px;color:var(--text-bright);line-height:1.4;}
    #cel-canvas{position:fixed;inset:0;pointer-events:none;z-index:99;display:none;}
    #cel-canvas.active{display:block;}
    .ov-voss{display:flex;align-items:center;gap:10px;background:var(--bg-panel);border:1px solid rgba(0,212,212,.35);border-radius:var(--r12);padding:10px 13px;max-width:320px;width:90%;animation:ov-voss-in .45s ease;}
    @keyframes ov-voss-in{from{transform:translateY(18px);opacity:0}to{transform:none;opacity:1}}
    .ov-voss-face{width:44px;height:44px;flex-shrink:0;border-radius:50%;overflow:hidden;border:1.5px solid rgba(0,212,212,.4);}
    .ov-voss-txt{font-size:11px;color:var(--text-mid);line-height:1.5;font-style:italic;}
    .ov-voss-txt strong{color:var(--text-bright);font-style:normal;}

    /* ── Sequence display ── */
    .seq-wrap {
      background:var(--bg-panel); border:0.5px solid var(--border-dim);
      border-radius:var(--r12); padding:14px; margin-bottom:10px;
    }
    .seq-lbl  { font-size:9px; color:var(--text-dim); letter-spacing:.08em; text-transform:uppercase; margin-bottom:10px; }
    .seq-tiles { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
    .seq-tile {
      flex:1; min-width:44px; max-width:80px;
      background:var(--bg-inset); border:1.5px solid var(--border-dim);
      border-radius:var(--r8); padding:10px 4px;
      text-align:center; font-size:clamp(16px,5vw,22px);
      font-weight:600; color:var(--text-bright);
      font-variant-numeric:tabular-nums;
      transition:border-color .2s, background .2s;
    }
    .seq-tile.blank {
      border-color:var(--cyan); background:rgba(0,212,212,0.07);
      color:var(--cyan); cursor:pointer;
    }
    .seq-tile.blank.active { background:rgba(0,212,212,0.14); box-shadow:0 0 0 2px rgba(0,212,212,0.3); }
    .seq-tile.blank.filled { color:var(--cyan); }
    .seq-tile.blank.correct { border-color:var(--green); background:rgba(68,221,136,0.1); color:var(--green); }
    .seq-tile.blank.wrong   { border-color:var(--red);   background:rgba(255,68,85,0.08);  color:var(--red); animation:shake .3s ease; }
    .seq-arrow { font-size:14px; color:var(--text-dim); flex-shrink:0; }

    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)} 40%{transform:translateX(4px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }

    /* rule badge */
    .rule-badge {
      margin-top:10px; display:inline-block;
      background:rgba(0,212,212,0.08); border:0.5px solid rgba(0,212,212,0.25);
      border-radius:20px; padding:4px 12px;
      font-size:10px; color:var(--cyan); letter-spacing:.04em;
    }
    .rule-badge.hidden { display:none; }

    /* ── Hint ── */
    .hint-panel { background:var(--bg-panel); border:0.5px solid var(--border-dim); border-radius:var(--r10); padding:10px 12px; margin-bottom:10px; font-size:11px; color:var(--text-mid); line-height:1.6; }
    .hint-panel strong { color:var(--cyan); }
    .hint-btn { font-size:10px; color:var(--text-dim); text-decoration:underline; background:none; border:none; cursor:pointer; padding:0; margin-top:4px; display:block; }

    /* ── Number pad ── */
    .numpad-wrap { background:var(--bg-panel); border:0.5px solid var(--border-dim); border-radius:var(--r12); padding:10px; }
    .numpad-display { background:var(--bg-inset); border:0.5px solid var(--border-dim); border-radius:var(--r8); padding:8px 12px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; min-height:40px; }
    .numpad-val  { font-size:22px; font-weight:500; color:var(--cyan); font-variant-numeric:tabular-nums; }
    .numpad-hint { font-size:10px; color:var(--text-dim); }
    .numpad-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
    .nk { background:var(--bg-inset); border:0.5px solid var(--border-dim); border-radius:var(--r8); padding:14px 8px; text-align:center; font-size:18px; font-weight:500; color:var(--text-bright); cursor:pointer; user-select:none; -webkit-user-select:none; transition:background .1s,transform .08s; -webkit-tap-highlight-color:transparent; }
    .nk:active { background:var(--bg-raised); transform:scale(0.94); }
    .nk.del { font-size:14px; color:var(--text-mid); }
    .nk.ok  { background:var(--cyan); color:#001a1a; font-size:14px; font-weight:600; border-color:var(--cyan); }
    .nk.ok:active { background:#00a0a0; }
    .nk.ok.off { opacity:0.35; pointer-events:none; }

    /* ── Warp overlay ── */
    .overlay { display:none; position:fixed; inset:0; background:#000; z-index:100; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
    .overlay.show { display:flex; }
    .star-field { position:absolute; inset:0; overflow:hidden; }
    .star { position:absolute; background:white; border-radius:50%; }
    @keyframes warp { 0%{transform:translateX(0) scaleX(1);opacity:1;} 100%{transform:translateX(calc(var(--dir)*150vw)) scaleX(14);opacity:0;} }
    .ov-inner { position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; gap:12px; }
    .ov-icon  { font-size:44px; }
    .ov-title { font-size:20px; font-weight:500; color:var(--text-bright); text-align:center; padding:0 20px; }
    .ov-sub   { font-size:13px; color:rgba(200,200,255,0.7); text-align:center; padding:0 24px; line-height:1.5; }
    .ov-btn   { padding:12px 32px; background:var(--cyan); color:#001a1a; border:none; border-radius:var(--r10); font-size:14px; font-weight:600; cursor:pointer; margin-top:4px; }
    .ov-btn:active { background:#00a0a0; }
    .ov-btn.sec { background:transparent; border:0.5px solid rgba(100,100,220,0.4); color:rgba(200,200,255,0.6); margin-top:0; }
  </style>
</head>
<body>
<div id="app">
  <a class="nav-back" href="mission_select.html">← Fleet Commander</a>

  <!-- ARIA companion -->
  <div class="aria-bar">
    <div class="aria-wrap" id="aria-wrap" onclick="ariaTap()">
      <svg viewBox="-2 0 60 70" xmlns="http://www.w3.org/2000/svg">
        <rect x="-2" y="32" width="12" height="8" rx="4" fill="#1e1e42"/>
        <rect x="46" y="32" width="12" height="8" rx="4" fill="#1e1e42"/>
        <rect x="8" y="28" width="40" height="30" rx="10" fill="#1e1e42"/>
        <ellipse cx="28" cy="18" rx="16" ry="15" fill="#242454"/>
        <rect x="12" y="10" width="32" height="14" rx="6" fill="rgba(0,8,28,.5)"/>
        <circle cx="20" cy="17" r="4.5" fill="white"/><circle id="aria-el" cx="21" cy="18" r="2.8" fill="#111"/><circle cx="20.3" cy="15.8" r=".9" fill="white"/>
        <circle cx="36" cy="17" r="4.5" fill="white"/><circle id="aria-er" cx="37" cy="18" r="2.8" fill="#111"/><circle cx="36.3" cy="15.8" r=".9" fill="white"/>
        <path d="M22,25 Q28,29 34,25" stroke="var(--aria-color)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <rect x="26" y="2" width="4" height="8" rx="2" fill="#242454"/>
        <circle cx="28" cy="2" r="3.2" fill="var(--aria-color)"/>
        <rect x="13" y="35" width="30" height="17" rx="5" fill="var(--aria-chest)"/>
        <circle cx="21" cy="42" r="2.3" fill="var(--aria-color)" opacity=".9"/>
        <circle cx="28" cy="42" r="2.3" fill="rgba(255,255,255,.35)"/>
        <circle cx="35" cy="42" r="2.3" fill="var(--aria-color)" opacity=".9"/>
        <rect x="16" y="48" width="24" height="2.5" rx="1.25" fill="var(--aria-color)" opacity=".4"/>
        <rect x="13" y="56" width="12" height="12" rx="5" fill="#1e1e42"/>
        <rect x="31" y="56" width="12" height="12" rx="5" fill="#1e1e42"/>
      </svg>
    </div>
    <div class="aria-bubble">
      <span class="aria-name">ARIA</span>
      <span class="aria-msg" id="aria-msg">Spot the pattern — ignite the warp!</span>
    </div>
  </div>

  <div class="hud">
    <div class="hud-main">
      <div class="hud-lbl">Mission 09 · Warp Drive</div>
      <div class="hud-text" id="hud-title">Ignition Sequence</div>
      <div class="hud-flavor" id="hud-flavor">Loading…</div>
    </div>
    <div style="text-align:right;flex-shrink:0;">
      <div class="hud-lbl">Level</div>
      <div class="hud-num" id="hud-level">46</div>
    </div>
  </div>

  <div class="power-wrap">
    <div class="power-meta"><span>Warp sequences loaded</span><span id="power-pct">0%</span></div>
    <div class="power-track"><div class="power-fill" id="power-fill"></div></div>
  </div>

  <!-- Sequence -->
  <div class="seq-wrap">
    <div class="seq-lbl">Ignition sequence — fill the blanks</div>
    <div class="seq-tiles" id="seq-tiles"></div>
    <div class="rule-badge" id="rule-badge"></div>
    <button class="hint-btn" id="hint-btn">Show rule hint</button>
  </div>

  <!-- Hint -->
  <div class="hint-panel" id="hint-panel" style="display:none;"></div>

  <!-- Number pad -->
  <div class="numpad-wrap">
    <div class="numpad-display">
      <span class="numpad-val" id="numpad-val">—</span>
      <span class="numpad-hint" id="numpad-hint">tap a blank tile</span>
    </div>
    <div class="numpad-grid">
      <div class="nk" data-k="7">7</div><div class="nk" data-k="8">8</div><div class="nk" data-k="9">9</div>
      <div class="nk" data-k="4">4</div><div class="nk" data-k="5">5</div><div class="nk" data-k="6">6</div>
      <div class="nk" data-k="1">1</div><div class="nk" data-k="2">2</div><div class="nk" data-k="3">3</div>
      <div class="nk del" data-k="del">⌫</div>
      <div class="nk" data-k="0">0</div>
      <div class="nk ok off" id="ok-btn" data-k="ok">Enter</div>
    </div>
  </div>
</div>

<canvas id="cel-canvas"></canvas>
<!-- Warp overlay -->
<div class="overlay" id="overlay">
  <div class="star-field" id="star-field"></div>
  <div class="ov-inner">
    <div class="ov-icon" id="ov-icon">🚀</div>
    <div class="ov-title" id="ov-title">Sequence Loaded</div>
    <div class="ov-sub"  id="ov-sub"></div>
    <button class="ov-btn" id="ov-next">Next Level →</button>
    <button class="ov-btn sec" id="ov-home">← Fleet Commander</button>
    <div class="ov-voss" id="ov-voss">
      <div class="ov-voss-face">
        <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
          <circle cx="22" cy="22" r="22" fill="#12103a"/>
          <path d="M6,44 Q8,30 22,28 Q36,30 38,44 Z" fill="#103040"/>
          <path d="M15,31 L22,28 L29,31 L22,35 Z" fill="#00d4d4" opacity=".65"/>
          <ellipse cx="22" cy="17" rx="11" ry="12" fill="#d4a870"/>
          <path d="M11,13 Q12,4 22,4 Q32,4 33,13 Q28,7 22,7 Q16,7 11,13 Z" fill="#2a2a2a"/>
          <ellipse cx="18" cy="17" rx="2" ry="2.2" fill="#2244cc"/>
          <ellipse cx="26" cy="17" rx="2" ry="2.2" fill="#2244cc"/>
          <path d="M18,25 Q22,28 26,25" stroke="#c4906a" stroke-width="1.2" fill="none"/>
          <rect x="14" y="32" width="16" height="2.5" rx="1.25" fill="#00d4d4" opacity=".7"/>
          <circle cx="18" cy="33.25" r=".9" fill="#e8c840"/>
          <circle cx="22" cy="33.25" r=".9" fill="#e8c840"/>
          <circle cx="26" cy="33.25" r=".9" fill="#e8c840"/>
        </svg>
      </div>
      <div class="ov-voss-txt" id="ov-voss-txt">"Warp sequence confirmed!"</div>
    </div>
  </div>
</div>

<script>
// ── Level data ──
// Each task: values array (null = blank), rule string, hint
// blanks: indices of null positions

const LEVELS = [
  {
    id: 46,
    title: 'Arithmetic +3',
    flavor: 'Each value increases by the same amount. Find the rule, fill the blank.',
    tasks: [
      { values:[3,6,9,null,15],  rule:'+3 each step',   hint:'<strong>3, 6, 9, ?, 15</strong> — add 3 each time. 9 + 3 = <strong>12</strong>.' },
      { values:[5,8,11,14,null], rule:'+3 each step',   hint:'<strong>5, 8, 11, 14, ?</strong> — add 3 each time. 14 + 3 = <strong>17</strong>.' },
      { values:[2,null,8,11,14], rule:'+3 each step',   hint:'<strong>2, ?, 8, 11, 14</strong> — add 3 each time. 2 + 3 = <strong>5</strong>.' },
    ]
  },
  {
    id: 47,
    title: 'Arithmetic −4',
    flavor: 'The sequence is decreasing. Each step subtracts the same amount.',
    tasks: [
      { values:[20,16,12,null,4],  rule:'−4 each step', hint:'<strong>20, 16, 12, ?, 4</strong> — subtract 4 each time. 12 − 4 = <strong>8</strong>.' },
      { values:[30,null,22,18,14], rule:'−4 each step', hint:'<strong>30, ?, 22, 18, 14</strong> — subtract 4. 30 − 4 = <strong>26</strong>.' },
      { values:[null,12,8,4,0],    rule:'−4 each step', hint:'<strong>?, 12, 8, 4, 0</strong> — subtract 4. 12 + 4 = <strong>16</strong>.' },
    ]
  },
  {
    id: 48,
    title: 'Geometric ×2',
    flavor: 'Each value doubles. Multiply — don\'t add — to find the pattern.',
    tasks: [
      { values:[1,2,4,null,16],   rule:'×2 each step', hint:'<strong>1, 2, 4, ?, 16</strong> — double each time. 4 × 2 = <strong>8</strong>.' },
      { values:[3,6,12,null,48],  rule:'×2 each step', hint:'<strong>3, 6, 12, ?, 48</strong> — double. 12 × 2 = <strong>24</strong>.' },
      { values:[2,null,8,16,32],  rule:'×2 each step', hint:'<strong>2, ?, 8, 16, 32</strong> — double. 2 × 2 = <strong>4</strong>.' },
    ]
  },
  {
    id: 49,
    title: 'Geometric ÷2',
    flavor: 'Each value is halved. Division sequences go down quickly — watch carefully.',
    tasks: [
      { values:[32,16,null,4,2],  rule:'÷2 each step', hint:'<strong>32, 16, ?, 4, 2</strong> — halve each time. 16 ÷ 2 = <strong>8</strong>.' },
      { values:[48,24,12,null,3], rule:'÷2 each step', hint:'<strong>48, 24, 12, ?, 3</strong> — halve. 12 ÷ 2 = <strong>6</strong>.' },
      { values:[null,16,8,4,null], rule:'÷2 each step', hint:'<strong>?, 16, 8, 4, ?</strong> — two blanks. 16 × 2 = <strong>32</strong>; 4 ÷ 2 = <strong>2</strong>.' },
    ]
  },
  {
    id: 50,
    title: 'Two Blanks — Find the Rule',
    flavor: 'Two missing values. Identify the rule first, then fill both blanks. Final warp sequence!',
    tasks: [
      { values:[2,4,null,16,null],   rule:'×2 each step', hint:'<strong>×2 rule</strong>: 2, 4, 8, 16, 32. Missing: <strong>8</strong> and <strong>32</strong>.' },
      { values:[null,10,14,null,22], rule:'+4 each step', hint:'<strong>+4 rule</strong>: 6, 10, 14, 18, 22. Missing: <strong>6</strong> and <strong>18</strong>.' },
      { values:[1,null,9,null,25],   rule:'odd squares',  hint:'<strong>Perfect squares of odd numbers</strong>: 1, 4... wait — 1, 3², 3², 4², 5². Actually: 1²=1, 2²=4... Let\'s try: 1, 4, 9, 16, 25. Missing: <strong>4</strong> and <strong>16</strong>. (These are perfect squares!)' },
    ]
  }
];

// Fix L49 last task — use integer-clean values
LEVELS[3].tasks[2] = { values:[null,16,8,4,null], rule:'÷2 each step', hint:'<strong>?, 16, 8, 4, ?</strong> — two blanks. 16 × 2 = <strong>32</strong>; 4 ÷ 2 = <strong>2</strong>.', _answers:[32, 2] };
// Fix L50 last task answers
LEVELS[4].tasks[2] = { values:[1,null,9,null,25], rule:'perfect squares', hint:'<strong>1, 4, 9, 16, 25</strong> — perfect squares: 1²=1, 2²=4, 3²=9, 4²=16, 5²=25. Missing: <strong>4</strong> and <strong>16</strong>.' };

const SAVE_KEY   = 'spacecrew_progress_v1';
const BASE_LEVEL = 46;
const TOTAL      = LEVELS.length;
let levelIdx=0, taskIdx=0, lv=null, task=null;
let blanks=[];   // [{idx, answer, el, solved}]
let activeBlank  = -1;
let inputVal     = '';

function loadSaved() {
  try { const r=localStorage.getItem(SAVE_KEY); if(r) return JSON.parse(r).warp||0; }catch(e){}
  return 0;
}
function writeSaved(n) {
  try {
    const def={o2:0,fuel:0,nav:0,power:0,med:0,docking:0,blast:0,engine:0,warp:0};
    const r=localStorage.getItem(SAVE_KEY);
    const p=r?Object.assign(def,JSON.parse(r)):def;
    p.warp=Math.max(p.warp||0,n);
    localStorage.setItem(SAVE_KEY,JSON.stringify(p));
  }catch(e){}
}

// compute answers from sequence
function getAnswers(values) {
  if (task._answers) return task._answers;
  // detect rule from known values
  const known = values.filter(v=>v!==null);
  // check arithmetic: all diffs equal
  const knownIdxs = values.map((v,i)=>v!==null?i:-1).filter(i=>i>=0);
  const answers = [];
  values.forEach((v,i)=>{ if(v===null) answers.push({idx:i}); });

  // For now use pre-set rule from task data — we'll inline answer
  // Actually, let's just compute from the full sequence via rule detection
  const ans = [];
  values.forEach((v,i)=>{ if(v===null) ans.push(i); });
  return ans;
}

// ── Build tiles ──
function buildTiles() {
  const container = document.getElementById('seq-tiles');
  container.innerHTML = '';
  blanks = [];

  task.values.forEach((v, i) => {
    if (i > 0) {
      const arrow = document.createElement('div');
      arrow.className = 'seq-arrow';
      arrow.textContent = '→';
      container.appendChild(arrow);
    }

    const tile = document.createElement('div');
    if (v !== null) {
      tile.className = 'seq-tile';
      tile.textContent = v;
    } else {
      tile.className = 'seq-tile blank';
      tile.textContent = '?';
      const blankIdx = blanks.length;
      tile.addEventListener('click', () => selectBlank(blankIdx));
      tile.addEventListener('touchstart', (e) => { e.preventDefault(); selectBlank(blankIdx); }, {passive:false});

      // compute answer for this blank
      const answer = computeAnswer(task.values, i, task.rule);
      blanks.push({ tileIdx:i, answer, el:tile, solved:false });
    }
    container.appendChild(tile);
  });

  // show/hide rule badge
  const rb = document.getElementById('rule-badge');
  rb.textContent = '';
  rb.classList.add('hidden');

  // hint
  document.getElementById('hint-panel').style.display = 'none';
  document.getElementById('hint-panel').innerHTML = task.hint;
  document.getElementById('hint-btn').textContent = 'Show rule hint';

  selectBlank(0);
}

function computeAnswer(values, blankPos, rule) {
  // Use pre-computed _answers if available
  if (task._answers) {
    const blankCount = values.filter(v=>v===null).indexOf(null);
    // find position among blanks
    const blankIdxInList = values.slice(0, blankPos+1).filter(v=>v===null).length - 1;
    return task._answers[blankIdxInList];
  }

  // Detect from rule string
  if (rule.includes('+')) {
    const step = parseInt(rule);
    // find step from known neighbours
    const known = values.map((v,i)=>({v,i})).filter(x=>x.v!==null);
    if (known.length >= 2) {
      const diff = (known[1].v - known[0].v) / (known[1].i - known[0].i);
      // find nearest known
      const prev = known.filter(x=>x.i < blankPos).pop();
      const next = known.find(x=>x.i > blankPos);
      if (prev) return prev.v + diff * (blankPos - prev.i);
      if (next) return next.v - diff * (next.i - blankPos);
    }
  }
  if (rule.includes('×') || rule.includes('*')) {
    const mult = rule.includes('×2') ? 2 : rule.includes('×3') ? 3 : 2;
    const known = values.map((v,i)=>({v,i})).filter(x=>x.v!==null);
    const prev = known.filter(x=>x.i<blankPos).pop();
    const next = known.find(x=>x.i>blankPos);
    if (prev) return prev.v * Math.pow(mult, blankPos - prev.i);
    if (next) return Math.round(next.v / Math.pow(mult, next.i - blankPos));
  }
  if (rule.includes('÷')) {
    const div = 2;
    const known = values.map((v,i)=>({v,i})).filter(x=>x.v!==null);
    const prev = known.filter(x=>x.i<blankPos).pop();
    if (prev) return Math.round(prev.v / Math.pow(div, blankPos - prev.i));
  }
  if (rule.includes('square')) {
    // 1,4,9,16,25 — (blankPos+1)^2
    return (blankPos+1) * (blankPos+1);
  }
  return 0;
}

// ── Select blank ──
function selectBlank(i) {
  if (i < 0 || i >= blanks.length) return;
  if (blanks[i].solved) {
    const next = blanks.findIndex(b=>!b.solved);
    if (next >= 0) selectBlank(next);
    return;
  }
  activeBlank = i;
  inputVal = '';
  blanks.forEach((b,j)=>{
    if (!b.solved) b.el.classList.toggle('active', j===i);
  });
  refreshPad();
}

function refreshPad() {
  const valEl  = document.getElementById('numpad-val');
  const hintEl = document.getElementById('numpad-hint');
  const okBtn  = document.getElementById('ok-btn');
  if (activeBlank < 0) { valEl.textContent='—'; okBtn.classList.add('off'); return; }
  valEl.textContent = inputVal||'—';
  hintEl.textContent = `blank ${activeBlank+1} of ${blanks.length}`;
  okBtn.classList.toggle('off', inputVal.length===0);
  const tile = blanks[activeBlank].el;
  tile.textContent = inputVal||'?';
  tile.classList.toggle('filled', inputVal.length>0);
}

function handleKey(k) {
  if (activeBlank < 0) return;
  if (k==='del') { inputVal=inputVal.slice(0,-1); }
  else if (k==='ok') { submitAnswer(); return; }
  else { if(inputVal.length>=4) return; inputVal+=k; }
  refreshPad();
}

function submitAnswer() {
  if (!inputVal || activeBlank<0) return;
  const entered = parseInt(inputVal,10);
  const blank   = blanks[activeBlank];

  if (entered === blank.answer) {
    blank.solved = true;
    blank.el.classList.remove('active','filled','wrong');
    blank.el.classList.add('correct');
    blank.el.textContent = entered;
    playClick();
    activeBlank = -1;
    inputVal = '';
    refreshPad();

    const next = blanks.findIndex(b=>!b.solved);
    if (next>=0) {
      setTimeout(()=>selectBlank(next), 350);
    } else {
      setTimeout(()=>finishTask(), 400);
    }
  } else {
    blank.el.classList.add('wrong');
    blank.el.textContent = entered;
    playBuzz();
    ariaReact('wrong');
    inputVal='';
    setTimeout(()=>{
      blank.el.classList.remove('wrong');
      blank.el.classList.add('active');
      blank.el.textContent = '?';
      refreshPad();
    }, 600);
  }
}

function finishTask() {
  // Show rule badge
  const rb = document.getElementById('rule-badge');
  rb.textContent = 'Rule: ' + task.rule;
  rb.classList.remove('hidden');
  playTaskWin();

  taskIdx++;
  if (taskIdx < lv.tasks.length) {
    setTimeout(()=>{ task=lv.tasks[taskIdx]; buildTiles(); }, 800);
    return;
  }
  taskIdx=0;
  const solved = levelIdx+1;
  writeSaved(solved);
  updatePowerBar(solved);

  const isLast = levelIdx >= TOTAL-1;
  document.getElementById('ov-title').textContent = isLast ? 'Warp Drive Engaged!' : lv.title + ' — Complete';
  document.getElementById('ov-sub').textContent = isLast
    ? 'All 50 levels complete. The SCVII Horizon warps into deep space. Mission accomplished, Commander.'
    : `Level ${BASE_LEVEL+levelIdx} complete. ${TOTAL-solved} level${TOTAL-solved===1?'':'s'} remain.`;
  document.getElementById('ov-icon').textContent = isLast ? '🚀' : '⚡';

  const next = document.getElementById('ov-next');
  if (isLast) {
    buildWarpStars();
    next.textContent = 'Back to Fleet →';
    next.onclick = ()=>{ window.location.href='mission_select.html#warp='+solved; };
  } else {
    next.textContent = `Level ${BASE_LEVEL+solved} →`;
    next.onclick = ()=>{ document.getElementById('overlay').classList.remove('show'); levelIdx++; loadLevel(); };
  }
  ariaReact('correct');
  launchCelebration();
  document.getElementById('ov-voss-txt').textContent = VOSS_QUIPS_WARP[Math.floor(Math.random()*VOSS_QUIPS_WARP.length)];
  setTimeout(()=>document.getElementById('overlay').classList.add('show'), 500);
}

function buildWarpStars() {
  const sf = document.getElementById('star-field');
  sf.innerHTML='';
  for(let i=0;i<150;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()<0.2?2:1;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${0.2+Math.random()*0.7};--dir:${Math.random()>0.5?1:-1};animation:warp ${0.4+Math.random()*0.8}s ${Math.random()*0.5}s ease-in forwards;`;
    sf.appendChild(s);
  }
}

function loadLevel() {
  lv = LEVELS[levelIdx];
  task = lv.tasks[0];
  taskIdx = 0;
  document.getElementById('hud-title').textContent  = lv.title;
  document.getElementById('hud-flavor').textContent = lv.flavor;
  document.getElementById('hud-level').textContent  = BASE_LEVEL+levelIdx;
  buildTiles();
}

function updatePowerBar(n) {
  const pct=Math.round(n/TOTAL*100);
  const f=document.getElementById('power-fill');
  f.style.width=pct+'%';
  f.className='power-fill'+(pct>=100?' maxed':'');
  document.getElementById('power-pct').textContent=pct+'%';
}

// hint button
document.getElementById('hint-btn').addEventListener('click', ()=>{
  const p=document.getElementById('hint-panel');
  const showing = p.style.display!=='none';
  p.style.display = showing ? 'none' : 'block';
  document.getElementById('hint-btn').textContent = showing ? 'Show rule hint' : 'Hide hint';
});

// numpad
document.querySelectorAll('.nk').forEach(btn=>{
  const k=btn.dataset.k;
  const onTap=(e)=>{e.preventDefault();handleKey(k);};
  btn.addEventListener('click',onTap);
  btn.addEventListener('touchstart',onTap,{passive:false});
});

// audio
let _ctx=null;
function _ac(){if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();if(_ctx.state==='suspended')_ctx.resume();return _ctx;}
function playClick() {
  try {
    const c=_ac(),o=c.createOscillator(),g=c.createGain();
    o.type='square';o.frequency.setValueAtTime(880,c.currentTime);o.frequency.exponentialRampToValueAtTime(440,c.currentTime+0.09);
    g.gain.setValueAtTime(0.14,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.12);
    o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.12);
  }catch(e){}
}
function playBuzz() {
  try {
    const c=_ac(),o=c.createOscillator(),g=c.createGain();
    o.type='sawtooth';o.frequency.value=110;
    g.gain.setValueAtTime(0.2,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.28);
    o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.28);
  }catch(e){}
}
function playTaskWin() {
  try {
    const c=_ac(),notes=[523,659,784,1047];
    notes.forEach((freq,i)=>{ const o=c.createOscillator(),g=c.createGain(); o.type='sine';o.frequency.value=freq; const t=c.currentTime+i*0.13; g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.14,t+0.04);g.gain.exponentialRampToValueAtTime(0.001,t+0.28); o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+0.28); });
  }catch(e){}
}

document.getElementById('ov-home').addEventListener('click',()=>{ window.location.href='mission_select.html#warp='+loadSaved(); });

// ══ ARIA companion ════════════════════════════════════════════════
const ARIA_MSGS_WARP={idle:["Spot the pattern!","Each number follows a rule...","Look at the gaps between numbers!","You're almost there, Commander!"],correct:["⭐ Pattern cracked!","Brilliant sequence work!","The warp ignition advances!","You decoded the cosmos!"],wrong:["Not quite — look at the pattern again!","Try tracing the rule step by step.","Oops! What comes between those numbers?","Don't give up — patterns love you!"]};
let _ariaTimerW=null;
function ariaSetMsg(msg){const el=document.getElementById('aria-msg');if(!el)return;clearTimeout(_ariaTimerW);el.textContent='';let i=0;(function t(){if(i<msg.length){el.textContent+=msg[i++];_ariaTimerW=setTimeout(t,20);}})();}
function ariaReact(type){const w=document.getElementById('aria-wrap');if(!w)return;const pool=ARIA_MSGS_WARP[type]||ARIA_MSGS_WARP.idle;ariaSetMsg(pool[Math.floor(Math.random()*pool.length)]);w.className='aria-wrap';void w.offsetWidth;if(type==='correct'){w.className='aria-wrap aria-happy';setTimeout(()=>{w.className='aria-wrap';},700);}else if(type==='wrong'){w.className='aria-wrap aria-sad';setTimeout(()=>{w.className='aria-wrap';},500);}}
function ariaTap(){const w=document.getElementById('aria-wrap');if(!w)return;w.className='aria-wrap';void w.offsetWidth;const msgs=["I'm ARIA — your AI navigator!","Every sequence has a pattern!","+, ×, ÷ — find the rule!","Math unlocks deep space!"];ariaSetMsg(msgs[Math.floor(Math.random()*msgs.length)]);w.style.transform='rotateY(360deg)';setTimeout(()=>{w.style.transform='';},500);}
(function ariaIdle(){setTimeout(()=>{if(!document.getElementById('overlay').classList.contains('show'))ariaSetMsg(ARIA_MSGS_WARP.idle[Math.floor(Math.random()*ARIA_MSGS_WARP.idle.length)]);ariaIdle();},10000);})();

// ══ Rainbow tile celebration ═══════════════════════════════════════
const VOSS_QUIPS_WARP=['"Warp sequence confirmed! Ignition in 3... 2... 1!"','"All patterns solved. Deep space awaits!"','"Sequence navigator skills: exceptional."','"The cosmos reveals its patterns to you!"','"Final ignition codes accepted. Jump incoming!"'];
function launchCelebration(){
  const canvas=document.getElementById('cel-canvas');if(!canvas)return;
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;canvas.classList.add('active');
  const ctx=canvas.getContext('2d');
  const tiles=[];
  const rainbow=['#ff4455','#ff7040','#f0b040','#44dd88','#00d4d4','#4488ff','#9f60ff','#cc44ff'];
  for(let i=0;i<60;i++){tiles.push({x:Math.random()*canvas.width,y:canvas.height+20,vy:-(4+Math.random()*6),vx:(Math.random()-.5)*3,size:12+Math.random()*18,rot:Math.random()*Math.PI*2,vrot:(Math.random()-.5)*.15,c:rainbow[i%rainbow.length],life:1,d:.009+Math.random()*.009});}
  (function frame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);let alive=false;
    tiles.forEach(p=>{if(p.life<=0)return;alive=true;p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.rot+=p.vrot;p.life-=p.d;
      ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.c;ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillRect(-p.size/2,-p.size*.3,p.size,p.size*.6);ctx.restore();});
    if(alive)requestAnimationFrame(frame);else{canvas.classList.remove('active');ctx.clearRect(0,0,canvas.width,canvas.height);}
  })();
}

(function init() {
  const saved=loadSaved();
  levelIdx=Math.min(saved,TOTAL-1);
  updatePowerBar(saved);
  loadLevel();
})();
