<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#06060f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Docking Ring">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>Docking Ring — Space Crew</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-deep:#06060f; --bg-panel:#0d0d1e; --bg-inset:#111122; --bg-raised:#161630;
      --border-dim:rgba(80,80,160,0.18); --border-glow:rgba(100,100,220,0.4);
      --text-bright:#eeeef8; --text-mid:#8888aa; --text-dim:#44445a;
      --cyan:#00d4d4; --blue:#4488ff; --purple:#9f60ff; --magenta:#cc44ff;
      --amber:#f0b040; --green:#44dd88; --red:#ff4455; --gold:#e8c840;
      --r8:8px; --r10:10px; --r12:12px;
    }
    html { min-height:100%; width:100%; overflow-y:scroll; }
    body {
      min-height:100%; width:100%; overflow-x:hidden; overflow-y:auto;
      background:var(--bg-deep); color:var(--text-bright);
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color:transparent;
      overscroll-behavior-x:none;
    }
    #app {
      padding:10px; width:100%; max-width:600px; margin:0 auto;
      padding-bottom:env(safe-area-inset-bottom, 24px);
    }
    .nav-back {
      font-size:11px; color:var(--text-dim); text-decoration:none;
      display:inline-flex; align-items:center; gap:4px; margin-bottom:8px;
    }

    /* ── HUD ── */
    .hud {
      background:var(--bg-panel); border:0.5px solid var(--border-dim);
      border-radius:var(--r12); padding:10px 12px; margin-bottom:8px;
      display:flex; gap:10px; align-items:flex-start;
    }
    .hud-main { flex:1; min-width:0; }
    .hud-lbl  { font-size:9px; color:var(--text-dim); letter-spacing:.08em; text-transform:uppercase; margin-bottom:2px; }
    .hud-text { font-size:12px; color:var(--text-bright); font-weight:500; line-height:1.3; }
    .hud-flavor { font-size:11px; color:var(--text-mid); font-style:italic; margin-top:2px; line-height:1.3; }
    .hud-lvl .hud-num { font-size:22px; font-weight:500; color:var(--gold); line-height:1; }

    /* ── Power bar ── */
    .power-wrap { margin-bottom:10px; }
    .power-meta { display:flex; justify-content:space-between; font-size:9px; color:var(--text-dim); letter-spacing:.07em; text-transform:uppercase; margin-bottom:3px; }
    .power-track { height:8px; background:var(--bg-inset); border:0.5px solid var(--border-dim); border-radius:4px; overflow:hidden; }
    .power-fill { height:100%; width:0%; border-radius:4px; background:var(--gold); transition:width .6s ease; }
    .power-fill.maxed {
      background:linear-gradient(90deg,#b09010,var(--gold),#fff4a0,var(--gold),#b09010);
      background-size:300%; animation:shimmer 1.2s linear infinite;
    }
    @keyframes shimmer { 0%{background-position:300%} 100%{background-position:0%} }

    /* ══ ARIA companion ══════════════════════════════════════════ */
    :root{--aria-color:#e8c840;--aria-chest:rgba(232,200,64,.2);}
    .aria-bar{display:flex;align-items:center;gap:10px;background:var(--bg-panel);border:0.5px solid var(--border-dim);border-radius:var(--r12);padding:8px 10px;margin-bottom:8px;}
    .aria-wrap{width:52px;height:52px;flex-shrink:0;cursor:pointer;animation:aria-bob 2.2s ease-in-out infinite;}
    @keyframes aria-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    .aria-wrap.aria-happy{animation:aria-bounce .55s ease;}
    @keyframes aria-bounce{0%,100%{transform:scale(1) translateY(0)}35%{transform:scale(1.2) translateY(-7px)}65%{transform:scale(.95) translateY(1px)}}
    .aria-wrap.aria-sad{animation:aria-wag .4s ease;}
    @keyframes aria-wag{0%,100%{transform:rotate(0)}30%{transform:rotate(-9deg)}70%{transform:rotate(9deg)}}
    .aria-bubble{flex:1;position:relative;background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.1);border-radius:var(--r10);padding:7px 10px;min-height:38px;}
    .aria-bubble::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);border:5px solid transparent;border-right-color:rgba(255,255,255,.1);}
    .aria-name{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--aria-color);display:block;margin-bottom:2px;}
    .aria-msg{font-size:11.5px;color:var(--text-bright);line-height:1.4;}
    #cel-canvas{position:fixed;inset:0;pointer-events:none;z-index:99;display:none;}
    #cel-canvas.active{display:block;}
    .ov-voss{display:flex;align-items:center;gap:10px;background:var(--bg-panel);border:1px solid rgba(232,200,64,.35);border-radius:var(--r12);padding:10px 13px;max-width:320px;width:90%;animation:ov-voss-in .45s ease;}
    @keyframes ov-voss-in{from{transform:translateY(18px);opacity:0}to{transform:none;opacity:1}}
    .ov-voss-face{width:44px;height:44px;flex-shrink:0;border-radius:50%;overflow:hidden;border:1.5px solid rgba(232,200,64,.4);}
    .ov-voss-txt{font-size:11px;color:var(--text-mid);line-height:1.5;font-style:italic;}
    .ov-voss-txt strong{color:var(--text-bright);font-style:normal;}

    /* ── Dial area ── */
    .dial-area {
      display:flex; align-items:center; justify-content:center;
      margin-bottom:10px; position:relative;
    }
    .dial-wrap { position:relative; }
    canvas#dial { display:block; touch-action:none; }

    /* ── Info panel ── */
    .info-row {
      display:flex; gap:8px; margin-bottom:10px;
    }
    .info-card {
      flex:1; background:var(--bg-panel); border:0.5px solid var(--border-dim);
      border-radius:var(--r10); padding:10px 12px;
      display:flex; flex-direction:column; gap:3px;
    }
    .info-lbl { font-size:9px; color:var(--text-dim); letter-spacing:.08em; text-transform:uppercase; }
    .info-val { font-size:22px; font-weight:500; font-variant-numeric:tabular-nums; color:var(--gold); }
    .info-val.match { color:var(--green); }
    .info-sub { font-size:10px; color:var(--text-dim); }

    /* ── Hint panel ── */
    .hint-panel {
      background:var(--bg-panel); border:0.5px solid var(--border-dim);
      border-radius:var(--r10); padding:10px 12px; margin-bottom:10px;
      font-size:11px; color:var(--text-mid); line-height:1.5;
    }
    .hint-panel strong { color:var(--gold); }

    /* ── Slider ── */
    .slider-wrap { margin-bottom:8px; }
    .slider-lbl-row { display:flex; justify-content:space-between; font-size:10px; color:var(--text-dim); margin-bottom:4px; }
    input[type=range] {
      -webkit-appearance:none; appearance:none; width:100%; height:36px;
      background:transparent; outline:none;
      touch-action:manipulation; cursor:pointer;
    }
    input[type=range]::-webkit-slider-runnable-track {
      height:4px; border-radius:2px;
      background:var(--bg-inset); border:0.5px solid var(--border-dim);
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; width:20px; height:20px;
      border-radius:50%; background:var(--gold);
      box-shadow:0 0 6px rgba(232,200,64,0.5); cursor:pointer;
      margin-top:-8px;
    }
    input[type=range].match::-webkit-slider-thumb { background:var(--green); box-shadow:0 0 8px rgba(68,221,136,0.6); }

    /* two-handle mode for L34/L35 */
    .dual-sliders { display:flex; flex-direction:column; gap:8px; margin-bottom:8px; }
    .dual-row { display:flex; align-items:center; gap:8px; }
    .dual-lbl { font-size:10px; color:var(--text-dim); width:20px; }

    /* ── Overlay ── */
    .overlay {
      display:none; position:fixed; inset:0;
      background:rgba(6,6,15,0.88); z-index:100;
      flex-direction:column; align-items:center; justify-content:center; gap:12px;
    }
    .overlay.show { display:flex; }
    .ov-icon  { font-size:44px; }
    .ov-title { font-size:20px; font-weight:500; color:var(--text-bright); text-align:center; padding:0 20px; }
    .ov-sub   { font-size:13px; color:var(--text-mid); text-align:center; padding:0 24px; line-height:1.5; }
    .ov-btn {
      padding:12px 32px; background:var(--gold); color:#1a1a00;
      border:none; border-radius:var(--r10); font-size:14px; font-weight:600;
      cursor:pointer; letter-spacing:.04em; margin-top:4px;
    }
    .ov-btn:active { background:#b8a000; }
    .ov-btn.sec {
      background:transparent; border:0.5px solid var(--border-glow);
      color:var(--text-mid); margin-top:0;
    }
  </style>
</head>
<body>
<div id="app">
  <a class="nav-back" href="mission_select.html">← Fleet Commander</a>

  <!-- ARIA companion -->
  <div class="aria-bar">
    <div class="aria-wrap" id="aria-wrap" onclick="ariaTap()">
      <svg viewBox="-2 0 60 70" xmlns="http://www.w3.org/2000/svg">
        <rect x="-2" y="32" width="12" height="8" rx="4" fill="#1e1e42"/>
        <rect x="46" y="32" width="12" height="8" rx="4" fill="#1e1e42"/>
        <rect x="8" y="28" width="40" height="30" rx="10" fill="#1e1e42"/>
        <ellipse cx="28" cy="18" rx="16" ry="15" fill="#242454"/>
        <rect x="12" y="10" width="32" height="14" rx="6" fill="rgba(0,8,28,.5)"/>
        <circle cx="20" cy="17" r="4.5" fill="white"/><circle id="aria-el" cx="21" cy="18" r="2.8" fill="#111"/><circle cx="20.3" cy="15.8" r=".9" fill="white"/>
        <circle cx="36" cy="17" r="4.5" fill="white"/><circle id="aria-er" cx="37" cy="18" r="2.8" fill="#111"/><circle cx="36.3" cy="15.8" r=".9" fill="white"/>
        <path d="M22,25 Q28,29 34,25" stroke="var(--aria-color)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <rect x="26" y="2" width="4" height="8" rx="2" fill="#242454"/>
        <circle cx="28" cy="2" r="3.2" fill="var(--aria-color)"/>
        <rect x="13" y="35" width="30" height="17" rx="5" fill="var(--aria-chest)"/>
        <circle cx="21" cy="42" r="2.3" fill="var(--aria-color)" opacity=".9"/>
        <circle cx="28" cy="42" r="2.3" fill="rgba(255,255,255,.35)"/>
        <circle cx="35" cy="42" r="2.3" fill="var(--aria-color)" opacity=".9"/>
        <rect x="16" y="48" width="24" height="2.5" rx="1.25" fill="var(--aria-color)" opacity=".4"/>
        <rect x="13" y="56" width="12" height="12" rx="5" fill="#1e1e42"/>
        <rect x="31" y="56" width="12" height="12" rx="5" fill="#1e1e42"/>
      </svg>
    </div>
    <div class="aria-bubble">
      <span class="aria-name">ARIA</span>
      <span class="aria-msg" id="aria-msg">Dial in the perfect angle!</span>
    </div>
  </div>

  <div class="hud">
    <div class="hud-main">
      <div class="hud-lbl">Mission 06 · Docking Ring</div>
      <div class="hud-text" id="hud-title">Aligning Ring A</div>
      <div class="hud-flavor" id="hud-flavor">Loading…</div>
    </div>
    <div class="hud-lvl" style="text-align:right; flex-shrink:0;">
      <div class="hud-lbl">Level</div>
      <div class="hud-num" id="hud-level">31</div>
    </div>
  </div>

  <div class="power-wrap">
    <div class="power-meta">
      <span>Docking alignment</span>
      <span id="power-pct">0%</span>
    </div>
    <div class="power-track">
      <div class="power-fill" id="power-fill"></div>
    </div>
  </div>

  <!-- Dial canvas -->
  <div class="dial-area">
    <div class="dial-wrap">
      <canvas id="dial" width="280" height="280"></canvas>
    </div>
  </div>

  <!-- Info row -->
  <div class="info-row">
    <div class="info-card">
      <div class="info-lbl">Target angle</div>
      <div class="info-val" id="info-target">90°</div>
      <div class="info-sub" id="info-type">right angle</div>
    </div>
    <div class="info-card">
      <div class="info-lbl">Current angle</div>
      <div class="info-val" id="info-cur">0°</div>
      <div class="info-sub" id="info-delta">—</div>
    </div>
  </div>

  <!-- Hint panel -->
  <div class="hint-panel" id="hint-panel"></div>

  <!-- Single slider (L31–L33) -->
  <div id="single-slider-wrap" class="slider-wrap">
    <div class="slider-lbl-row"><span>0°</span><span>360°</span></div>
    <input type="range" id="angle-slider" min="0" max="360" value="0" step="1">
  </div>

  <!-- Dual sliders (L34–L35) -->
  <div id="dual-slider-wrap" class="dual-sliders" style="display:none;">
    <div class="dual-row">
      <div class="dual-lbl" style="color:var(--gold);">A</div>
      <input type="range" id="angle-a" min="0" max="180" value="0" step="1" style="flex:1;">
      <div style="font-size:12px;color:var(--gold);width:40px;text-align:right;" id="val-a">0°</div>
    </div>
    <div class="dual-row">
      <div class="dual-lbl" style="color:var(--cyan);">B</div>
      <input type="range" id="angle-b" min="0" max="180" value="0" step="1" style="flex:1;">
      <div style="font-size:12px;color:var(--cyan);width:40px;text-align:right;" id="val-b">0°</div>
    </div>
    <div style="font-size:11px;color:var(--text-dim);text-align:center;padding-top:2px;" id="dual-sum">A + B = 0°</div>
  </div>
</div>

<canvas id="cel-canvas"></canvas>
<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="ov-icon">🔗</div>
  <div class="ov-title" id="ov-title">Ring Aligned</div>
  <div class="ov-sub" id="ov-sub"></div>
  <button class="ov-btn" id="ov-next">Next Level →</button>
  <button class="ov-btn sec" id="ov-home">← Fleet Commander</button>
  <div class="ov-voss" id="ov-voss">
    <div class="ov-voss-face">
      <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="22" r="22" fill="#12103a"/>
        <path d="M6,44 Q8,30 22,28 Q36,30 38,44 Z" fill="#181208"/>
        <path d="M15,31 L22,28 L29,31 L22,35 Z" fill="#e8c840" opacity=".65"/>
        <ellipse cx="22" cy="17" rx="11" ry="12" fill="#d4a870"/>
        <path d="M11,13 Q12,4 22,4 Q32,4 33,13 Q28,7 22,7 Q16,7 11,13 Z" fill="#2a2a2a"/>
        <ellipse cx="18" cy="17" rx="2" ry="2.2" fill="#2244cc"/>
        <ellipse cx="26" cy="17" rx="2" ry="2.2" fill="#2244cc"/>
        <path d="M18,25 Q22,28 26,25" stroke="#c4906a" stroke-width="1.2" fill="none"/>
        <rect x="14" y="32" width="16" height="2.5" rx="1.25" fill="#e8c840" opacity=".7"/>
        <circle cx="18" cy="33.25" r=".9" fill="#e8c840"/>
        <circle cx="22" cy="33.25" r=".9" fill="#e8c840"/>
        <circle cx="26" cy="33.25" r=".9" fill="#e8c840"/>
      </svg>
    </div>
    <div class="ov-voss-txt" id="ov-voss-txt">"Docking clamps locked!"</div>
  </div>
</div>

<script>
// ── Level data ──
// mode 'single': one angle dial, target angle
// mode 'dual':   two dials A + B, target sum
// tolerance: degrees within which answer is accepted

const LEVELS = [
  {
    id: 31,
    title: 'Cardinal Angles',
    flavor: 'Right angles mark the four cardinal lock points. Turn the ring to each one.',
    mode: 'single',
    tasks: [
      { target:90,  type:'right angle',       hint:'A right angle is <strong>1/4</strong> of a full turn (360°).' },
      { target:180, type:'straight angle',    hint:'A straight angle is <strong>1/2</strong> a full turn — a straight line.' },
      { target:270, type:'reflex right angle',hint:'Three right angles = <strong>3/4</strong> of a full turn.' },
    ],
    tolerance: 4
  },
  {
    id: 32,
    title: 'Acute Angles',
    flavor: 'Fine adjustment required. Acute angles are less than 90°.',
    mode: 'single',
    tasks: [
      { target:30,  type:'acute — 30°', hint:'<strong>30°</strong> is 1/12 of a full turn. Less than a right angle (90°).' },
      { target:45,  type:'acute — 45°', hint:'<strong>45°</strong> is 1/8 of a full turn. Exactly half a right angle.' },
      { target:60,  type:'acute — 60°', hint:'<strong>60°</strong> is 1/6 of a full turn. Equilateral triangle angle.' },
    ],
    tolerance: 3
  },
  {
    id: 33,
    title: 'Obtuse Angles',
    flavor: 'Between 90° and 180°. Greater than a right angle but less than a straight line.',
    mode: 'single',
    tasks: [
      { target:120, type:'obtuse — 120°', hint:'<strong>120°</strong> is greater than 90° but less than 180°. That makes it obtuse.' },
      { target:135, type:'obtuse — 135°', hint:'<strong>135°</strong> = 90° + 45°. One right angle plus one half-right angle.' },
      { target:150, type:'obtuse — 150°', hint:'<strong>150°</strong> = 180° − 30°. Thirty degrees short of a straight line.' },
    ],
    tolerance: 3
  },
  {
    id: 34,
    title: 'Complementary Pairs',
    flavor: 'Two angles that together make exactly 90°. They are complementary.',
    mode: 'dual',
    targetSum: 90,
    sumLabel: '90° (complementary)',
    tasks: [
      { a:30, b:60, hint:'<strong>30° + 60° = 90°</strong>. Any two angles summing to 90° are complementary.' },
      { a:45, b:45, hint:'<strong>45° + 45° = 90°</strong>. Equal complementary angles.' },
      { a:20, b:70, hint:'<strong>20° + 70° = 90°</strong>. Check: they add to a right angle.' },
    ],
    tolerance: 3
  },
  {
    id: 35,
    title: 'Supplementary Pairs',
    flavor: 'Two angles that together make exactly 180°. They are supplementary.',
    mode: 'dual',
    targetSum: 180,
    sumLabel: '180° (supplementary)',
    tasks: [
      { a:60,  b:120, hint:'<strong>60° + 120° = 180°</strong>. Together they make a straight line.' },
      { a:90,  b:90,  hint:'<strong>90° + 90° = 180°</strong>. Two right angles make a straight line.' },
      { a:45,  b:135, hint:'<strong>45° + 135° = 180°</strong>. Supplementary — they line up flat.' },
    ],
    tolerance: 3
  }
];

// ── State ──
const SAVE_KEY   = 'spacecrew_progress_v1';
const BASE_LEVEL = 31;
const TOTAL      = LEVELS.length;

let levelIdx    = 0;
let taskIdx     = 0;
let lv          = null;
let task        = null;
let angleA      = 0;
let angleB      = 0;
let stableFrames = 0;
let won         = false;
const STABLE    = 50;  // frames in tolerance

const canvas    = document.getElementById('dial');
const ctx2d     = canvas.getContext('2d');
const W = canvas.width, H = canvas.height, CX = W/2, CY = H/2, R = W/2 - 22;

// ── Persistence ──
function loadSaved() {
  try { const r=localStorage.getItem(SAVE_KEY); if(r) return JSON.parse(r).docking||0; }catch(e){}
  return 0;
}
function writeSaved(n) {
  try {
    const def={o2:0,fuel:0,nav:0,power:0,med:0,docking:0};
    const r=localStorage.getItem(SAVE_KEY);
    const p=r?Object.assign(def,JSON.parse(r)):def;
    p.docking=Math.max(p.docking||0,n);
    localStorage.setItem(SAVE_KEY,JSON.stringify(p));
  }catch(e){}
}

// ── Draw dial ──
function drawDial() {
  ctx2d.clearRect(0, 0, W, H);

  // outer ring
  ctx2d.beginPath();
  ctx2d.arc(CX, CY, R, 0, Math.PI*2);
  ctx2d.strokeStyle = 'rgba(80,80,160,0.25)';
  ctx2d.lineWidth = 1.5;
  ctx2d.stroke();

  // degree tick marks + labels
  for (let deg = 0; deg < 360; deg += 30) {
    const rad = (deg - 90) * Math.PI / 180;
    const isMajor = deg % 90 === 0;
    const tickLen = isMajor ? 12 : 6;
    const x1 = CX + (R - tickLen) * Math.cos(rad);
    const y1 = CY + (R - tickLen) * Math.sin(rad);
    const x2 = CX + R * Math.cos(rad);
    const y2 = CY + R * Math.sin(rad);

    ctx2d.beginPath();
    ctx2d.moveTo(x1, y1);
    ctx2d.lineTo(x2, y2);
    ctx2d.strokeStyle = isMajor ? 'rgba(232,200,64,0.4)' : 'rgba(80,80,160,0.3)';
    ctx2d.lineWidth = isMajor ? 1.5 : 1;
    ctx2d.stroke();

    if (isMajor) {
      const lx = CX + (R - 24) * Math.cos(rad);
      const ly = CY + (R - 24) * Math.sin(rad);
      ctx2d.fillStyle = 'rgba(232,200,64,0.55)';
      ctx2d.font = '10px sans-serif';
      ctx2d.textAlign = 'center';
      ctx2d.textBaseline = 'middle';
      ctx2d.fillText(deg + '°', lx, ly);
    }
  }

  if (lv.mode === 'single') {
    drawSingleDial();
  } else {
    drawDualDial();
  }
}

function drawSingleDial() {
  const target = task.target;
  const tol    = lv.tolerance;
  const inTol  = Math.abs(angleA - target) <= tol;

  // ghost arc for target
  const tRad = (target - 90) * Math.PI / 180;
  ctx2d.beginPath();
  ctx2d.moveTo(CX, CY);
  ctx2d.arc(CX, CY, R - 18, -Math.PI/2, tRad);
  ctx2d.fillStyle = 'rgba(232,200,64,0.08)';
  ctx2d.fill();

  // target line (ghost)
  ctx2d.beginPath();
  ctx2d.moveTo(CX, CY);
  ctx2d.lineTo(CX + (R-4)*Math.cos(tRad), CY + (R-4)*Math.sin(tRad));
  ctx2d.strokeStyle = inTol ? 'rgba(68,221,136,0.6)' : 'rgba(232,200,64,0.4)';
  ctx2d.lineWidth = 2;
  ctx2d.setLineDash([6,4]);
  ctx2d.stroke();
  ctx2d.setLineDash([]);

  // current arc
  const cRad = (angleA - 90) * Math.PI / 180;
  ctx2d.beginPath();
  ctx2d.moveTo(CX, CY);
  ctx2d.arc(CX, CY, R - 18, -Math.PI/2, cRad);
  ctx2d.fillStyle = inTol ? 'rgba(68,221,136,0.18)' : 'rgba(232,200,64,0.12)';
  ctx2d.fill();

  // current needle
  ctx2d.beginPath();
  ctx2d.moveTo(CX, CY);
  ctx2d.lineTo(CX + (R-4)*Math.cos(cRad), CY + (R-4)*Math.sin(cRad));
  ctx2d.strokeStyle = inTol ? 'var(--green)' : '#e8c840';
  ctx2d.lineWidth = 3;
  ctx2d.stroke();

  // handle circle at needle tip
  ctx2d.beginPath();
  ctx2d.arc(CX + (R-4)*Math.cos(cRad), CY + (R-4)*Math.sin(cRad), 8, 0, Math.PI*2);
  ctx2d.fillStyle = inTol ? 'var(--green)' : '#e8c840';
  ctx2d.fill();

  // center dot
  ctx2d.beginPath();
  ctx2d.arc(CX, CY, 5, 0, Math.PI*2);
  ctx2d.fillStyle = 'rgba(232,200,64,0.6)';
  ctx2d.fill();
}

function drawDualDial() {
  const targetSum = lv.targetSum;
  const tol = lv.tolerance;
  const sum = angleA + angleB;
  const diff = Math.abs(sum - targetSum);
  const inTol = diff <= tol;

  // Arc A (gold, from 0°)
  const aRad = (angleA - 90) * Math.PI / 180;
  ctx2d.beginPath();
  ctx2d.moveTo(CX, CY);
  ctx2d.arc(CX, CY, R - 18, -Math.PI/2, aRad);
  ctx2d.fillStyle = 'rgba(232,200,64,0.14)';
  ctx2d.fill();

  // Arc B (cyan, from angleA)
  const bRad = (angleA + angleB - 90) * Math.PI / 180;
  ctx2d.beginPath();
  ctx2d.moveTo(CX, CY);
  ctx2d.arc(CX, CY, R - 18, aRad, bRad);
  ctx2d.fillStyle = 'rgba(0,212,212,0.12)';
  ctx2d.fill();

  // needle A
  ctx2d.beginPath();
  ctx2d.moveTo(CX, CY);
  ctx2d.lineTo(CX + (R-4)*Math.cos(aRad), CY + (R-4)*Math.sin(aRad));
  ctx2d.strokeStyle = '#e8c840';
  ctx2d.lineWidth = 3;
  ctx2d.stroke();

  // needle B
  ctx2d.beginPath();
  ctx2d.moveTo(CX, CY);
  ctx2d.lineTo(CX + (R-4)*Math.cos(bRad), CY + (R-4)*Math.sin(bRad));
  ctx2d.strokeStyle = inTol ? '#44dd88' : '#00d4d4';
  ctx2d.lineWidth = 3;
  ctx2d.stroke();

  // handle A
  ctx2d.beginPath();
  ctx2d.arc(CX + (R-4)*Math.cos(aRad), CY + (R-4)*Math.sin(aRad), 8, 0, Math.PI*2);
  ctx2d.fillStyle = '#e8c840';
  ctx2d.fill();

  // handle B
  ctx2d.beginPath();
  ctx2d.arc(CX + (R-4)*Math.cos(bRad), CY + (R-4)*Math.sin(bRad), 8, 0, Math.PI*2);
  ctx2d.fillStyle = inTol ? '#44dd88' : '#00d4d4';
  ctx2d.fill();

  // center
  ctx2d.beginPath();
  ctx2d.arc(CX, CY, 5, 0, Math.PI*2);
  ctx2d.fillStyle = 'rgba(232,200,64,0.6)';
  ctx2d.fill();

  // update sum label
  document.getElementById('dual-sum').textContent = `A + B = ${angleA + angleB}°`;
  document.getElementById('dual-sum').style.color = inTol ? 'var(--green)' : 'var(--text-dim)';
}

// ── Update UI ──
function updateUI() {
  if (lv.mode === 'single') {
    const tol = lv.tolerance;
    const diff = Math.abs(angleA - task.target);
    const inTol = diff <= tol;
    document.getElementById('info-target').textContent = task.target + '°';
    document.getElementById('info-type').textContent   = task.type;
    document.getElementById('info-cur').textContent    = angleA + '°';
    document.getElementById('info-cur').className      = 'info-val' + (inTol ? ' match' : '');
    document.getElementById('info-delta').textContent  = inTol ? 'locked ✓' : (diff + '° off');
    document.getElementById('angle-slider').value      = angleA;
    document.getElementById('angle-slider').className  = inTol ? 'match' : '';
  } else {
    const sum = angleA + angleB;
    const diff = Math.abs(sum - lv.targetSum);
    const inTol = diff <= lv.tolerance;
    document.getElementById('info-target').textContent = lv.targetSum + '°';
    document.getElementById('info-type').textContent   = lv.sumLabel;
    document.getElementById('info-cur').textContent    = sum + '°';
    document.getElementById('info-cur').className      = 'info-val' + (inTol ? ' match' : '');
    document.getElementById('info-delta').textContent  = inTol ? 'locked ✓' : (diff + '° off');
    document.getElementById('val-a').textContent = angleA + '°';
    document.getElementById('val-b').textContent = angleB + '°';
  }
  drawDial();
}

// ── Check win condition ──
function checkWin() {
  let inTol = false;
  if (lv.mode === 'single') {
    inTol = Math.abs(angleA - task.target) <= lv.tolerance;
  } else {
    inTol = Math.abs(angleA + angleB - lv.targetSum) <= lv.tolerance;
  }

  if (inTol && !won) {
    stableFrames++;
    if (stableFrames >= STABLE) triggerWin();
  } else if (!inTol) {
    stableFrames = 0;
  }
}

function triggerWin() {
  if (won) return;
  won = true;
  playWin();

  taskIdx++;
  if (taskIdx < lv.tasks.length) {
    setTimeout(() => {
      task = lv.tasks[taskIdx];
      angleA = 0; angleB = 0;
      won = false; stableFrames = 0;
      setMode();
      updateHint();
      updateUI();
    }, 600);
    return;
  }

  // level done
  taskIdx = 0;
  const solved = levelIdx + 1;
  writeSaved(solved);
  updatePowerBar(solved);

  const isLast = levelIdx >= TOTAL - 1;
  document.getElementById('ov-title').textContent = lv.title + ' — Aligned';
  document.getElementById('ov-sub').textContent = isLast
    ? 'All docking rings aligned. Mission complete!'
    : `Level ${BASE_LEVEL + levelIdx} complete. ${TOTAL - solved} level${TOTAL-solved===1?'':'s'} remain.`;

  const next = document.getElementById('ov-next');
  if (isLast) {
    next.textContent = 'Back to Fleet →';
    next.onclick = () => { window.location.href = 'mission_select.html#docking=' + solved; };
  } else {
    next.textContent = `Level ${BASE_LEVEL + solved} →`;
    next.onclick = () => {
      document.getElementById('overlay').classList.remove('show');
      levelIdx++;
      loadLevel();
    };
  }
  ariaReact('correct');
  launchCelebration();
  document.getElementById('ov-voss-txt').textContent = VOSS_QUIPS_DOCK[Math.floor(Math.random()*VOSS_QUIPS_DOCK.length)];
  setTimeout(() => document.getElementById('overlay').classList.add('show'), 400);
}

// ── Mode switch (single vs dual) ──
function setMode() {
  const single = document.getElementById('single-slider-wrap');
  const dual   = document.getElementById('dual-slider-wrap');
  if (lv.mode === 'dual') {
    single.style.display = 'none';
    dual.style.display   = 'flex';
    document.getElementById('angle-a').max = lv.targetSum;
    document.getElementById('angle-b').max = lv.targetSum;
    document.getElementById('angle-a').value = 0;
    document.getElementById('angle-b').value = 0;
  } else {
    single.style.display = '';
    dual.style.display   = 'none';
    document.getElementById('angle-slider').value = 0;
  }
}

function updateHint() {
  const t = lv.tasks[taskIdx];
  document.getElementById('hint-panel').innerHTML = t.hint || '';
}

// ── Load level ──
function loadLevel() {
  lv = LEVELS[levelIdx];
  task = lv.tasks[0];
  taskIdx = 0;
  angleA = 0; angleB = 0;
  won = false; stableFrames = 0;

  document.getElementById('hud-title').textContent  = lv.title;
  document.getElementById('hud-flavor').textContent = lv.flavor;
  document.getElementById('hud-level').textContent  = BASE_LEVEL + levelIdx;

  setMode();
  updateHint();
  updateUI();
}

// ── Power bar ──
function updatePowerBar(solved) {
  const pct  = Math.round(solved / TOTAL * 100);
  const fill = document.getElementById('power-fill');
  fill.style.width = pct + '%';
  fill.className   = 'power-fill' + (pct >= 100 ? ' maxed' : '');
  document.getElementById('power-pct').textContent = pct + '%';
}

// ── Slider wiring ──
document.getElementById('angle-slider').addEventListener('input', function() {
  angleA = parseInt(this.value);
  updateUI();
});

document.getElementById('angle-a').addEventListener('input', function() {
  angleA = parseInt(this.value);
  updateUI();
});
document.getElementById('angle-b').addEventListener('input', function() {
  angleB = parseInt(this.value);
  updateUI();
});

// ── Audio ──
let _ctx = null;
function _ac(){if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();if(_ctx.state==='suspended')_ctx.resume();return _ctx;}
function playWin() {
  try {
    const c=_ac(), notes=[523,659,784,1047];
    notes.forEach((freq,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type='sine'; o.frequency.value=freq;
      const t=c.currentTime+i*0.13;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.14,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
      o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t+0.28);
    });
  }catch(e){}
}

// ── rAF win detection loop ──
function loop() {
  checkWin();
  requestAnimationFrame(loop);
}

// ══ ARIA companion ════════════════════════════════════════════════
const ARIA_MSGS_DOCK={idle:["Rotate the dial to the target angle!","Gold = target. Green = yours. Match them!","Angles measured in degrees — try it!","Precise docking saves the mission!"],correct:["⭐ Perfect angle!","Docking ring aligned — brilliant!","Angular geometry mastered!","Rescue shuttle locked on!"],wrong:[]};
let _ariaTimerD=null;
function ariaSetMsg(msg){const el=document.getElementById('aria-msg');if(!el)return;clearTimeout(_ariaTimerD);el.textContent='';let i=0;(function t(){if(i<msg.length){el.textContent+=msg[i++];_ariaTimerD=setTimeout(t,20);}})();}
function ariaReact(type){const w=document.getElementById('aria-wrap');if(!w)return;const pool=ARIA_MSGS_DOCK[type]||ARIA_MSGS_DOCK.idle;if(!pool.length)return;ariaSetMsg(pool[Math.floor(Math.random()*pool.length)]);w.className='aria-wrap';void w.offsetWidth;if(type==='correct'){w.className='aria-wrap aria-happy';setTimeout(()=>{w.className='aria-wrap';},700);}else if(type==='wrong'){w.className='aria-wrap aria-sad';setTimeout(()=>{w.className='aria-wrap';},500);}}
function ariaTap(){const w=document.getElementById('aria-wrap');if(!w)return;w.className='aria-wrap';void w.offsetWidth;const msgs=["I'm ARIA — your AI navigator!","90° = complementary pair!","180° = supplementary pair!","Angles unlock the universe!"];ariaSetMsg(msgs[Math.floor(Math.random()*msgs.length)]);w.style.transform='rotateY(360deg)';setTimeout(()=>{w.style.transform='';},500);}
(function ariaIdle(){setTimeout(()=>{if(!document.getElementById('overlay').classList.contains('show'))ariaSetMsg(ARIA_MSGS_DOCK.idle[Math.floor(Math.random()*ARIA_MSGS_DOCK.idle.length)]);ariaIdle();},10000);})();

// ══ Gold spark ring celebration ══════════════════════════════════
const VOSS_QUIPS_DOCK=['"Docking clamps engaged! Rescue locked!"','"Perfect angle, Commander. Textbook docking!"','"Geometric precision saved the crew!"','"That\'s the angle. Docking ring secured!"','"Supplementary angles never looked so good!"'];
function launchCelebration(){
  const canvas=document.getElementById('cel-canvas');if(!canvas)return;
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;canvas.classList.add('active');
  const ctx=canvas.getContext('2d');const cx=canvas.width/2,cy=canvas.height/2;
  const sparks=[],confetti=[];
  for(let i=0;i<60;i++){const a=(i/60)*Math.PI*2,sp=3+Math.random()*4;sparks.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:1.5+Math.random()*2.5,c:Math.random()>.4?'#e8c840':'#f0b040',life:1,d:.018+Math.random()*.012});}
  const ccols=['#e8c840','#ff7040','#9f60ff','#00d4d4','#44dd88','#cc44ff'];
  for(let i=0;i<50;i++){confetti.push({x:Math.random()*canvas.width,y:-20,vx:(Math.random()-.5)*3,vy:2+Math.random()*4,size:6+Math.random()*10,rot:Math.random()*Math.PI*2,vrot:(Math.random()-.5)*.2,c:ccols[i%ccols.length],life:1,d:.007+Math.random()*.008});}
  (function frame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    sparks.forEach(p=>{if(p.life<=0)return;p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=p.d;ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.c;ctx.shadowBlur=8;ctx.shadowColor=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();});
    confetti.forEach(p=>{if(p.life<=0)return;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vrot;p.life-=p.d;ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.c;ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillRect(-p.size/2,-p.size*.35,p.size,p.size*.7);ctx.restore();});
    const alive=sparks.some(p=>p.life>0)||confetti.some(p=>p.life>0);
    if(alive)requestAnimationFrame(frame);else{canvas.classList.remove('active');ctx.clearRect(0,0,canvas.width,canvas.height);}
  })();
}

// ── Home ──
document.getElementById('ov-home').addEventListener('click', () => {
  window.location.href = 'mission_select.html#docking=' + loadSaved();
});

// ── Init ──
(function init() {
  const saved = loadSaved();
  levelIdx = Math.min(saved, TOTAL - 1);
  lv = LEVELS[levelIdx];
  updatePowerBar(saved);
  loadLevel();
  requestAnimationFrame(loop);
})();
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js').catch(() => {}); }
